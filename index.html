  return all;
}

// Mismo criterio de en-vivo/finalizado/programado que usamos en los
// partidos de grupo (getEffectiveStatus), pero para un cupo de eliminatoria
// — si todavía no se sabe quién juega (TBD), es "programado" sin más vueltas.
function knockoutEntryStatus(m) {
  const { teamA, teamB } = resolveKnockoutSides(m);
  if (!teamA || !teamB) return { status: 'scheduled', teamA: null, teamB: null };
  const live = getLiveData({ home: teamA, away: teamB, kickoffUTC: m.kickoffUTC });
  const apiStatus = live ? live.status : null;
  const realKickoffUTC = (live && live.kickoffUTC) ? live.kickoffUTC : m.kickoffUTC;
  const now = new Date();
  const kickoff = new Date(realKickoffUTC);
  const estimatedEnd = new Date(kickoff.getTime() + 115 * 60000);
  const timeInferredLive = now >= kickoff && now < estimatedEnd;
  const timeInferredFinished = now >= estimatedEnd;
  const isLive = isLiveStatus(apiStatus) || (!isFinishedStatus(apiStatus) && timeInferredLive);
  const isFinished = isFinishedStatus(apiStatus) || (!isLiveStatus(apiStatus) && timeInferredFinished);
  let status = 'scheduled';
  if (isLive) status = 'live'; else if (isFinished) status = 'finished';
  return { status, teamA, teamB };
}

// Agrupa partidos de eliminatoria por día, igual que buildDateGroupedHtml
// hace con los de grupo — pero usando buildKnockoutCardHtml (soporta TBD).
function buildKnockoutDateGroupedHtml(entries, descending) {
  const sorted = entries.slice().sort((a, b) =>
    descending ? new Date(b.kickoffUTC) - new Date(a.kickoffUTC) : new Date(a.kickoffUTC) - new Date(b.kickoffUTC)
  );
  let html = '';
  let currentDateKey = null;
  sorted.forEach(m => {
    const dateKey = toARDateStr(m.kickoffUTC);
    if (dateKey !== currentDateKey) {
      if (currentDateKey !== null) html += '</div></div>';
      currentDateKey = dateKey;
      html += '<div class="date-section">';
      html += '<div class="date-header">' + formatDateHeader(m.kickoffUTC) + '</div>';
      html += '<div class="match-grid">';
    }
    html += buildKnockoutCardHtml(m);
  });
  if (currentDateKey !== null) html += '</div></div>';
  return html;
}

// buildKnockoutCardHtml convierte un partido de eliminatoria al mismo
// formato que usa buildMatchCard — así hay una sola función de render.
function buildKnockoutCardHtml(m) {
  const { teamA, teamB } = resolveKnockoutSides(m);
  const normalized = {
    home: teamA || null,
    away: teamB || null,
    homeTBDLabel: teamA ? null : bracketSlotLabel(m.a),
    awayTBDLabel: teamB ? null : bracketSlotLabel(m.b),
    kickoffUTC: m.kickoffUTC,
    stadium: m.stadium,
    city: m.city,
    group: null,
    roundLabel: (m.roundLabel || '') + ' · ' + t('partidoNro') + ' ' + m.match,
  };
  return buildMatchCard(normalized);
}

// Un equipo se considera eliminado cuando su grupo terminó los 6 partidos
// y quedó 3° o 4°. Mientras el grupo no esté 100% completo, no se asume
// eliminación (no hay datos de fase eliminatoria real en este momento).
function isTeamEliminated(code) {
  // Eliminatoria primero: si ya jugó y perdió un partido de eliminación
  // directa (Dieciseisavos en adelante), está eliminado sin más vueltas —
  // no hace falta ni mirar la fase de grupos.
  const knockoutLoss = getAllKnockoutEntries().some(m => {
    const { status, teamA, teamB } = knockoutEntryStatus(m);
    if (status !== 'finished') return false;
    if (teamA !== code && teamB !== code) return false;
    const live = getLiveData({ home: teamA, away: teamB, kickoffUTC: m.kickoffUTC });
    if (!live || live.homeGoals === null || live.homeGoals === undefined) return false;
    // En eliminatoria no hay empates: si hubo penales, esos definen al
    // ganador real (el marcador normal puede haber quedado igualado).
    let winner;
    if (live.penaltyHome !== undefined && live.penaltyHome !== null) {
      winner = live.penaltyHome > live.penaltyAway ? teamA : teamB;
    } else {
      winner = live.homeGoals > live.awayGoals ? teamA : (live.awayGoals > live.homeGoals ? teamB : null);
    }
    return winner && winner !== code;
  });
  if (knockoutLoss) return true;

  const anyMatch = SCHEDULE.find(m => m.home === code || m.away === code);
  if (!anyMatch) return false;
  const groupLetter = anyMatch.group;
  const groupMatches = SCHEDULE.filter(m => m.group === groupLetter);
  const allFinished = groupMatches.every(m => {
    const r = getMatchResult(m);
    return r.isFinished && r.hasScore;
  });
  if (!allFinished) return false;
  const standings = computeStandings(groupLetter);
  const idx = standings.findIndex(row => row.team === code);
  if (idx === 3) return true; // 4° puesto: eliminado siempre, no hay salvavidas
  if (idx === 2) {
    // 3er puesto: primero chequeamos si ya es matemáticamente imposible
    // que entre entre los 8 mejores (esto no necesita esperar a que
    // terminen los 12 grupos — es una certeza, no una probabilidad).
    if (isThirdMathematicallyOut(code)) return true;
    // Si todavía no es matemáticamente seguro, recién ahí esperamos a que
    // terminen los 12 grupos para la confirmación final.
    const qualifiedThirdGroups = getQualifiedThirdGroups();
    if (!qualifiedThirdGroups) return false;
    return !qualifiedThirdGroups.includes(groupLetter);
  }
  return false; // 1° o 2° puesto
}

// ── Estadísticas del torneo: goleadores y tarjetas ──────────────────────
// Juntamos los eventos de TODOS los partidos que ya tengan datos reales —
// fase de grupos siempre, y de la eliminatoria los cupos que ya estén
// resueltos (mismo scores.json, sin pedir nada nuevo a la API).
function collectTournamentEvents() {
  const all = [];
  SCHEDULE.forEach(m => {
    const live = getLiveData(m);
    if (live && live.events) {
      live.events.forEach(e => all.push({ ...e, round: 0 }));
    }
  });
  const knockoutRounds = [
    { cal: R32_CALENDAR, round: 1 },
    { cal: R16_CALENDAR, round: 2 },
    { cal: QF_CALENDAR, round: 3 },
    { cal: SF_CALENDAR, round: 4 },
    { cal: THIRD_PLACE_CALENDAR, round: 5 },
    { cal: FINAL_CALENDAR, round: 5 },
  ];
  knockoutRounds.forEach(({ cal, round }) => {
    cal.forEach(m => {
      const { teamA, teamB } = resolveKnockoutSides(m);
      if (!teamA || !teamB) return;
      const live = getLiveData({ home: teamA, away: teamB, kickoffUTC: m.kickoffUTC });
      if (live && live.events) {
        live.events.forEach(e => all.push({ ...e, round, matchId: m.match }));
      }
    });
  });
  return all;
}

// Ranking de goleadores — los autogoles no cuentan para el jugador.
function buildScorersRanking(allEvents) {
  const tally = {};
  allEvents.forEach(e => {
    if (e.type !== 'Goal' || !e.player || e.detail === 'Own Goal') return;
    const key = e.player + '|' + e.team;
    if (!tally[key]) tally[key] = { player: e.player, team: e.team, goals: 0 };
    tally[key].goals++;
  });
  return Object.values(tally).sort((a, b) => b.goals - a.goals);
}

// Tarjetas + lógica de suspensión por amarillas acumuladas, según la regla
// real de FIFA para este Mundial: 2 amarillas en partidos distintos entre
// el debut y cuartos de final = suspensión para el próximo partido. Las
// amarillas se "limpian" al llegar a semifinales (ronda 4 en adelante).
function buildCardsData(allEvents) {
  const players = {};
  function getOrCreate(name, team) {
    const key = name + '|' + team;
    if (!players[key]) {
      players[key] = { player: name, team, yellowMatches: [], redCount: 0 };
    }
    return players[key];
  }
  allEvents.forEach(e => {
    if (e.type !== 'Card' || !e.player) return;
    const p = getOrCreate(e.player, e.team);
    const matchTag = (e.matchId !== undefined ? 'k' + e.matchId : matchKey(e.team, '')) + '_r' + e.round;
    if ((e.detail || '').toLowerCase().includes('red')) {
      p.redCount++;
    } else {
      p.yellowMatches.push({ matchTag, round: e.round });
    }
  });

  return Object.values(players).map(p => {
    // Contamos amarillas distintas por partido (si por algún motivo hubiera
    // 2 eventos de amarilla en el mismo partido, cuentan como 1 acumulada,
    // ya que la 2da amarilla en el mismo partido se resuelve como roja aparte).
    const uniqueByMatch = [...new Map(p.yellowMatches.map(y => [y.matchTag, y])).values()];
    const preSemis = uniqueByMatch.filter(y => y.round < 4).length;
    const semisOnward = uniqueByMatch.filter(y => y.round >= 4).length;
    const suspended = p.redCount > 0 || preSemis >= 2 || semisOnward >= 2;
    return {
      player: p.player, team: p.team,
      yellowTotal: uniqueByMatch.length,
      redCount: p.redCount,
      suspended,
    };
  }).filter(p => p.yellowTotal > 0 || p.redCount > 0)
    .sort((a, b) => (b.redCount - a.redCount) || (b.yellowTotal - a.yellowTotal));
}

function renderStatsView() {
  const allEvents = collectTournamentEvents();
  const scorers = buildScorersRanking(allEvents).slice(0, 10);

// ── Bracket visual ───────────────────────────────────────────────────────
// Estructura fija del bracket de 32 (de acuerdo al calendario oficial de
// la FIFA). Cada entrada define qué par de partidos de una ronda alimenta
// al siguiente. Las claves son los números de partido del R32_CALENDAR.
// Para el bracket visual, el esqueleto del árbol (qué partido alimenta a
// cuál) viene del calendario oficial de la FIFA (R16_CALENDAR, etc.) — eso
// es estructura fija que no cambia. Los DATOS (quién juega, marcador, etc.)
// se leen siempre desde liveData en tiempo real.
//
// El orden izquierda/derecha se determina a qué semifinal lleva cada rama:
//   SF P101 ← QF P97+P98 → izquierda
//   SF P102 ← QF P99+P100 → derecha

// Construye la tarjeta compacta del bracket para cualquier partido de
// eliminatoria, resolviendo los equipos y el resultado desde liveData.
function buildVbCardFromMatch(match) {
  if (!match) return '<div class="vb-card"><div class="vb-card-tbd">NO DATA</div></div>';
  const { home, away, homeGoals, awayGoals, status, penaltyHome, penaltyAway, kickoffUTC } = match;
  const now = new Date();
  const kickoff = new Date(kickoffUTC);
  const end = new Date(kickoff.getTime() + 115 * 60000);
  const isLive = isLiveStatus(status) || (!isFinishedStatus(status) && now >= kickoff && now < end);
  const isFinished = isFinishedStatus(status) || (!isLiveStatus(status) && now >= end);
  const hasScore = homeGoals !== null && homeGoals !== undefined;
  const cardClass = 'vb-card' + (isLive ? ' live' : isFinished ? ' finished' : '');
  const homeWin = hasScore && isFinished && homeGoals > awayGoals;
  const awayWin = hasScore && isFinished && awayGoals > homeGoals;

  function teamRow(team, goals, isWinner) {
    if (!team) return '<div class="vb-team"><span style="color:#64748b;font-size:9px">?</span></div>';
    const scoreHtml = hasScore
      ? '<span class="vb-score' + (isLive ? ' live-score' : '') + '">' + goals + '</span>' : '';
    return '<div class="vb-team">' + flag(team) +
      '<span class="vb-team-name' + (isWinner ? ' winner' : '') + '">' + countryCode(team) + '</span>' +
      scoreHtml + '</div>';
  }
  let penHtml = '';
  if (penaltyHome !== null && penaltyHome !== undefined) {
    penHtml = '<div class="vb-time">(' + penaltyHome + '-' + penaltyAway + ') pen</div>';
  }
  const timeStr = !hasScore && !isLive
    ? new Date(kickoffUTC).toLocaleTimeString(dateLocale(), { hour: '2-digit', minute: '2-digit', hour12: false })
    : '';
  return '<div class="' + cardClass + '">' +
    teamRow(home, homeGoals, homeWin) +
    teamRow(away, awayGoals, awayWin) +
    (timeStr ? '<div class="vb-time">' + timeStr + '</div>' : '') +
    penHtml + '</div>';
}

// Resuelve un partido de eliminatoria a su representación para el bracket.
// Combina el calendario (estructura/horario) con liveData (equipos/marcador).
function resolveVbMatch(calEntry) {
  if (!calEntry) return null;
  const { teamA, teamB } = resolveKnockoutSides(calEntry);
  const live = teamA && teamB
    ? getLiveData({ home: teamA, away: teamB, kickoffUTC: calEntry.kickoffUTC }) : null;
  return {
    home: teamA || null, away: teamB || null,
    kickoffUTC: calEntry.kickoffUTC,
    homeGoals: live ? live.homeGoals : null,
    awayGoals: live ? live.awayGoals : null,
    status: live ? live.status : null,
    penaltyHome: live ? live.penaltyHome : null,
    penaltyAway: live ? live.penaltyAway : null,
  };
}

// Estructura del bracket: cada "section" agrupa 2 partidos de 16avos que
// convergen a un partido de Octavos, que a su vez converge a un Cuarto, etc.
// El orden sigue el árbol de la FIFA (los que van a SF P101 = izquierda,
// los que van a SF P102 = derecha). Este dato lo derivamos del R16_CALENDAR
// mirando qué specs 'Wxx' apuntan a qué partido de Octavos.
function buildBracketSections() {
  // Para cada Octavo, encontramos los dos 16avos que lo alimentan
  // leyendo los specs 'a' y 'b' de R16_CALENDAR.
  function findR32ForR16(r16Num) {
    const r16Entry = R16_CALENDAR.find(m => m.match === r16Num);
    if (!r16Entry) return [];
    const aNum = parseInt((r16Entry.a || '').replace('W',''), 10);
    const bNum = parseInt((r16Entry.b || '').replace('W',''), 10);
    return [aNum, bNum].filter(n => !isNaN(n));
  }
  function buildSection(r16Num, qfNum, sfNum) {
    return { r32: findR32ForR16(r16Num), r16: r16Num, qf: qfNum, sf: sfNum };
  }
  // QF P97 = W89+W90 → SF P101; QF P98 = W93+W94 → SF P101
  // QF P99 = W91+W92 → SF P102; QF P100 = W95+W96 → SF P102
  const left = [
    buildSection(89, 97, 101),
    buildSection(90, 97, 101),
    buildSection(93, 98, 101),
    buildSection(94, 98, 101),
  ];
  const right = [
    buildSection(91, 99, 102),
    buildSection(92, 99, 102),
    buildSection(95, 100, 102),
    buildSection(96, 100, 102),
  ];
  return { left, right };
}

function buildVbHalfFromSections(sections, side, label16, label8, label4, labelSF) {
  const roundsLeft = [
    { label: label16, key: 'r32' },
    { label: label8,  key: 'r16' },
    { label: label4,  key: 'qf'  },
    { label: labelSF, key: 'sf'  },
  ];
  // Derecha: SF primero (cerca del centro), R32 último (extremo derecho)
  const rounds = side === 'left' ? roundsLeft : [...roundsLeft].reverse();

  let html = '<div class="vb-half vb-' + side + '">';
  rounds.forEach((round, ri) => {
    if (ri > 0) html += '<div class="vb-connector"></div>';
    html += '<div class="vb-round"><div class="vb-round-label">' + round.label + '</div><div class="vb-slots">';

    if (round.key === 'r32') {
      sections.forEach(sec => {
        html += '<div class="vb-group">';
        sec.r32.forEach(matchNum => {
          const cal = R32_CALENDAR.find(m => m.match === matchNum);
          html += '<div class="vb-slot">' + buildVbCardFromMatch(resolveVbMatch(cal)) + '</div>';
        });
        html += '</div>';
      });
    } else if (round.key === 'r16') {
      [[0,1],[2,3]].forEach(pair => {
        html += '<div class="vb-group">';
        pair.forEach(i => {
          const cal = R16_CALENDAR.find(m => m.match === sections[i].r16);
          html += '<div class="vb-slot">' + buildVbCardFromMatch(resolveVbMatch(cal)) + '</div>';
        });
        html += '</div>';
      });
    } else if (round.key === 'qf') {
      const qfNums = [...new Set(sections.map(s => s.qf))];
      html += '<div class="vb-group">';
      qfNums.forEach(qfNum => {
        const cal = QF_CALENDAR.find(m => m.match === qfNum);
        html += '<div class="vb-slot">' + buildVbCardFromMatch(resolveVbMatch(cal)) + '</div>';
      });
      html += '</div>';
    } else if (round.key === 'sf') {
      const sfNum = sections[0].sf;
      const cal = SF_CALENDAR.find(m => m.match === sfNum);
      html += '<div class="vb-group"><div class="vb-slot vb-no-line">' + buildVbCardFromMatch(resolveVbMatch(cal)) + '</div></div>';
    }
    html += '</div></div>';
  });
  html += '</div>';
  return html;
}

function buildRadialBracket() {
  const W=340, H=430, cx=W/2, cy=148;
  const R={team:138,r32:116,r16:93,qf:70,sf:47,final:22};
  const R32_ORDER=[74,77,73,75,83,84,81,82,76,78,79,80,86,88,85,87];
  const R16_MAP=[[89,[74,77]],[90,[73,75]],[93,[83,84]],[94,[81,82]],[91,[76,78]],[92,[79,80]],[95,[86,88]],[96,[85,87]]];
  const QF_MAP =[[97,[89,90]],[98,[93,94]],[99,[91,92]],[100,[95,96]]];
  const SF_MAP =[[101,[97,98]],[102,[99,100]]];

  const ang={};
  R32_ORDER.forEach((n,i)=>{ang['r32_'+n]=i*22.5;});
  R16_MAP.forEach(([n,[a,b]])=>{ang['r16_'+n]=(ang['r32_'+a]+ang['r32_'+b])/2;});
  QF_MAP .forEach(([n,[a,b]])=>{ang['qf_' +n]=(ang['r16_'+a]+ang['r16_'+b])/2;});
  SF_MAP .forEach(([n,[a,b]])=>{ang['sf_' +n]=(ang['qf_' +a]+ang['qf_' +b])/2;});

  function pt(r,deg){
    const rad=(deg-90)*Math.PI/180;
    return [+(cx+r*Math.cos(rad)).toFixed(1),+(cy+r*Math.sin(rad)).toFixed(1)];
  }

  function getWinner(rv){
    if(!rv||!rv.home||!rv.away) return null;
    if(rv.penaltyHome!=null&&rv.penaltyHome!==undefined)
      return rv.penaltyHome>rv.penaltyAway?rv.home:rv.away;
    if(rv.homeGoals>rv.awayGoals) return rv.home;
    if(rv.awayGoals>rv.homeGoals) return rv.away;
    return null;
  }

  // Nodo: bandera del ganador si jugado, códigos si se sabe quién juega, vacío si TBD
  function node(r,deg,res,radius){
    const[nx,ny]=pt(r,deg);
    const rv=res||{};
    const done=rv.status&&isFinishedStatus(rv.status);
    const live=rv.status&&isLiveStatus(rv.status);
    const hs=rv.homeGoals!=null&&rv.homeGoals!==undefined;
    const fill=live?'#5a0000':done?'#0a1f4a':'#141c30';
    const sk=live?'#ef4444':done?'#3b82f6':'#2a3a50';
    let s=`<circle cx="${nx}" cy="${ny}" r="${radius}" fill="${fill}" stroke="${sk}" stroke-width="1.5"/>`;
    if(done&&hs&&rv.home&&rv.away){
      const winner=getWinner(rv);
      if(winner){
        const fs=radius*1.5;
        s+=`<foreignObject x="${+(nx-fs/2).toFixed(1)}" y="${+(ny-fs/2).toFixed(1)}" width="${fs}" height="${fs}"><div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:${Math.round(fs*0.75)}px;line-height:1;">${flag(winner)}</div></foreignObject>`;
      }
    }else if(!done&&rv.home&&rv.away){
      s+=`<text x="${nx}" y="${+(ny+2).toFixed(1)}" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#6a7a8a">${countryCode(rv.home)}</text>`;
      s+=`<text x="${nx}" y="${+(ny+8.5).toFixed(1)}" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#6a7a8a">${countryCode(rv.away)}</text>`;
    }
    // Si no se sabe quién juega: círculo vacío
    return s;
  }

  let s=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" width="100%" style="display:block;max-width:340px;margin:0 auto;">`;
  s+=`<rect width="${W}" height="${H}" rx="12" fill="#0a0e1a"/>`;

  // Anillos guía
  [R.r32,R.r16,R.qf,R.sf].forEach(r=>{
    s+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1a2535" stroke-width="0.5" stroke-dasharray="2,4"/>`;
  });

  // Líneas conectoras
  R16_MAP.forEach(([r16n,[a,b]])=>{[a,b].forEach(r32n=>{const[x1,y1]=pt(R.r32,ang['r32_'+r32n]),[x2,y2]=pt(R.r16,ang['r16_'+r16n]);s+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#1e2e42" stroke-width="1.3"/>`;});});
  QF_MAP .forEach(([qfn,[a,b]])=>{[a,b].forEach(r16n=>{const[x1,y1]=pt(R.r16,ang['r16_'+r16n]),[x2,y2]=pt(R.qf,ang['qf_'+qfn]);s+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#1e2e42" stroke-width="1.3"/>`;});});
  SF_MAP .forEach(([sfn,[a,b]])=>{[a,b].forEach(qfn=>{const[x1,y1]=pt(R.qf,ang['qf_'+qfn]),[x2,y2]=pt(R.sf,ang['sf_'+sfn]);s+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#1e2e42" stroke-width="1.3"/>`;});});
  SF_MAP .forEach(([sfn])=>{const[x1,y1]=pt(R.sf,ang['sf_'+sfn]);s+=`<line x1="${x1}" y1="${y1}" x2="${cx}" y2="${cy}" stroke="#1e2e42" stroke-width="1.3"/>`;});

  // Extensión 3er puesto: línea desde la Final hacia abajo
  const thirdY=cy+R.team+52;
  s+=`<line x1="${cx}" y1="${+(cy+R.final).toFixed(1)}" x2="${cx}" y2="${+(thirdY-18).toFixed(1)}" stroke="#1e2e42" stroke-width="1.3" stroke-dasharray="4,3"/>`;

  // Labels del anillo exterior (solo texto, sin HTML)
  R32_ORDER.forEach(matchNum=>{
    const cal=R32_CALENDAR.find(m=>m.match===matchNum);
    const res=resolveVbMatch(cal)||{};
    const{home,away,homeGoals,awayGoals,status}=res;
    const done=status&&isFinishedStatus(status);
    const hs=homeGoals!=null&&homeGoals!==undefined;
    const deg=ang['r32_'+matchNum];
    const[hx,hy]=pt(R.team,deg-5.5);
    const[ax,ay]=pt(R.team,deg+5.5);
    // Usar getWinner() en vez de comparar goles directamente — cubre penales
    const winner=done&&hs?getWinner(res):null;
    const hWin=winner&&winner===home;
    const aWin=winner&&winner===away;
    if(home) s+=`<text x="${hx}" y="${+(hy+3).toFixed(1)}" text-anchor="middle" font-family="monospace" font-size="7" font-weight="${hWin?700:400}" fill="${hWin?'#FFD700':done&&hs?'#334155':'#8899aa'}" opacity="${done&&hs&&!hWin?0.4:1}">${countryCode(home)}</text>`;
    if(away) s+=`<text x="${ax}" y="${+(ay+3).toFixed(1)}" text-anchor="middle" font-family="monospace" font-size="7" font-weight="${aWin?700:400}" fill="${aWin?'#FFD700':done&&hs?'#334155':'#8899aa'}" opacity="${done&&hs&&!aWin?0.4:1}">${countryCode(away)}</text>`;
    s+=node(R.r32,deg,res,11);
  });

  // Nodos R16, QF, SF
  R16_MAP.forEach(([r16n])=>{s+=node(R.r16,ang['r16_'+r16n],resolveVbMatch(R16_CALENDAR.find(m=>m.match===r16n)),11);});
  QF_MAP .forEach(([qfn]) =>{s+=node(R.qf, ang['qf_' +qfn], resolveVbMatch(QF_CALENDAR .find(m=>m.match===qfn)), 12);});
  SF_MAP .forEach(([sfn]) =>{s+=node(R.sf, ang['sf_' +sfn], resolveVbMatch(SF_CALENDAR .find(m=>m.match===sfn)), 13);});

  // Centro: Final
  const fRes=resolveVbMatch(FINAL_CALENDAR[0])||{};
  const fDone=fRes.status&&isFinishedStatus(fRes.status);
  const fHs=fRes.homeGoals!=null&&fRes.homeGoals!==undefined;
  const fFill=fDone&&fHs?'#0a1f4a':'#141c30';
  const fSk=fDone&&fHs?'#FFD700':'#2a3a50';
  s+=`<circle cx="${cx}" cy="${cy}" r="${R.final}" fill="${fFill}" stroke="${fSk}" stroke-width="2"/>`;
  if(fDone&&fHs&&fRes.home&&fRes.away){
    const winner=getWinner(fRes);
    const loser=winner===fRes.home?fRes.away:fRes.home;
    if(winner){
      const wfs=R.final*1.4;
      s+=`<foreignObject x="${+(cx-wfs/2).toFixed(1)}" y="${+(cy-R.final*0.85).toFixed(1)}" width="${wfs}" height="${wfs}"><div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:${Math.round(wfs*0.8)}px;line-height:1;">${flag(winner)}</div></foreignObject>`;
      const lfs=R.final*0.85;
      s+=`<foreignObject x="${+(cx-lfs/2).toFixed(1)}" y="${+(cy+R.final*0.25).toFixed(1)}" width="${lfs}" height="${lfs}"><div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:${Math.round(lfs*0.75)}px;line-height:1;opacity:0.6;">${flag(loser)}</div></foreignObject>`;
    }
  }else{
    s+=`<text x="${cx}" y="${+(cy+7).toFixed(1)}" text-anchor="middle" font-size="17">\u{1F3C6}</text>`;
  }

  // Nodo 3er puesto
  const tRes=resolveVbMatch(THIRD_PLACE_CALENDAR[0])||{};
  const tDone=tRes.status&&isFinishedStatus(tRes.status);
  const tHs=tRes.homeGoals!=null&&tRes.homeGoals!==undefined;
  s+=`<circle cx="${cx}" cy="${thirdY}" r="16" fill="${tDone&&tHs?'#0a1f4a':'#141c30'}" stroke="${tDone&&tHs?'#94a3b8':'#2a3a50'}" stroke-width="1.5"/>`;
  if(tDone&&tHs&&tRes.home&&tRes.away){
    const tw=getWinner(tRes);
    if(tw){const fs=16*1.5;s+=`<foreignObject x="${+(cx-fs/2).toFixed(1)}" y="${+(thirdY-fs/2).toFixed(1)}" width="${fs}" height="${fs}"><div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:${Math.round(fs*0.75)}px;line-height:1;">${flag(tw)}</div></foreignObject>`;}
  }else if(tRes.home&&tRes.away){
    s+=`<text x="${cx}" y="${+(thirdY+2).toFixed(1)}" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#6a7a8a">${countryCode(tRes.home)}</text>`;
    s+=`<text x="${cx}" y="${+(thirdY+8.5).toFixed(1)}" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#6a7a8a">${countryCode(tRes.away)}</text>`;
  }
  s+=`<text x="${cx}" y="${+(thirdY+30).toFixed(1)}" text-anchor="middle" font-size="8" fill="#374151">3\u00b0</text>`;

  s+='</svg>';
  return `<div style="padding:8px 0 4px;">${s}</div>`;
}

// Busca, entre todos los partidos del equipo, el más relevante para mostrar
// alineación: preferimos uno en vivo o recién finalizado: si no hay,
// el próximo programado (aunque la alineación ahí puede no estar
// disponible todavía — la API la publica ~1h antes del partido).
function findRelevantLineupMatch(code, forcedMatchKey) {
  // Si el forcedMatchKey referencia un partido de eliminatoria (clave ko_kickoff),
  // buscamos ESE partido específico — si ya fue jugado, mostramos su lineup;
  // si todavía no, no mostramos lineup (igual que un partido de grupo sin jugar).
  if (forcedMatchKey && forcedMatchKey.startsWith('ko_')) {
    const kickoff = forcedMatchKey.slice(3);
    const liveEntry = findKnockoutLiveEntry(kickoff);
    if (!liveEntry) return null; // no fue jugado todavía
    // Construimos un objeto compatible con lo que espera getLineupData
    return { home: liveEntry.home, away: liveEntry.away, kickoffUTC: kickoff, isKnockout: true };
  }

  const teamMatches = SCHEDULE.filter(m => m.home === code || m.away === code);
  if (teamMatches.length === 0) return null;

  if (forcedMatchKey) {
    const forced = teamMatches.find(m => matchKey(m.home, m.away) === forcedMatchKey);
    if (forced) return forced;
  }

  // Partidos de eliminatoria ya jugados donde participa este equipo
  const knockoutPlayed = getAllMatchesUnified().filter(m =>
    m.isKnockout && (m.home === code || m.away === code) && getUnifiedStatus(m) === 'finished'
  );

  const withLineups = [
    ...teamMatches,
    ...knockoutPlayed,
  ].filter(m => {
    const live = m.isKnockout
      ? getLiveData({ home: m.home, away: m.away, kickoffUTC: m.kickoffUTC })
      : getLiveData(m);
    return live && live.lineups && live.lineups[code];
  });

  if (withLineups.length > 0) {
    return withLineups.sort((a, b) =>
      new Date(getUnifiedKickoff(b)) - new Date(getUnifiedKickoff(a))
    )[0];
  }

  // Si ninguno tiene alineación todavía, mostramos el próximo partido sin jugar
  const upcoming = teamMatches
    .filter(m => !getMatchResult(m).isFinished)
    .sort((a, b) => new Date(getKickoffUTC(a)) - new Date(getKickoffUTC(b)));
  return upcoming[0] || null;
}

// Calcula una sola vez los datos cruzados (titulares, cambios, banco) para
// no repetir la misma lógica en las dos columnas del modal.
function getLineupData(code, forcedMatchKey) {
  const match = findRelevantLineupMatch(code, forcedMatchKey);
  if (!match) return { match: null };

  const live = getLiveData(match);
  const lineup = live && live.lineups ? live.lineups[code] : null;
  const rivalCode = match.home === code ? match.away : match.home;
  const rivalName = esName(rivalCode);
  const rivalLineup = live && live.lineups ? live.lineups[rivalCode] : null;

  if (!lineup || !lineup.startXI || lineup.startXI.length === 0) {
    return { match, lineup: null, rivalName, rivalCode, rivalLineup };
  }

  // Cruzamos la alineación inicial con los cambios reales del partido
  // (vienen del mismo endpoint de eventos que ya usamos para goles/tarjetas)
  // para saber quién sigue en cancha y quién ya entró desde el banco.
  const subs = (live && live.substitutions && live.substitutions[code]) || [];

  const onPitch = lineup.startXI
    .filter(p => !subs.some(s => sameNamePerson(s.out, p.name)))
    .map(p => ({ ...p, inMinute: null }));

  const enteredFromBench = (lineup.substitutes || [])
    .map(p => {
      const sub = subs.find(s => sameNamePerson(s.in, p.name));
      return sub ? { ...p, inMinute: sub.minute } : null;
    })
    .filter(Boolean);

  const stillOnBench = (lineup.substitutes || [])
    .filter(p => !subs.some(s => sameNamePerson(s.in, p.name)));

  const onPitchSorted = onPitch.concat(enteredFromBench).sort((a, b) => {
    const na = (a.number === null || a.number === undefined) ? 999 : a.number;
    const nb = (b.number === null || b.number === undefined) ? 999 : b.number;
    return na - nb;
  });

  // Mismo cruce de cambios, pero para el rival — lo necesitamos para poder
  // dibujar las dos formaciones juntas en la cancha gráfica.
  let rivalOnPitch = null;
  if (rivalLineup && rivalLineup.startXI && rivalLineup.startXI.length > 0) {
    const rivalSubs = (live && live.substitutions && live.substitutions[rivalCode]) || [];
    const rOnPitch = rivalLineup.startXI.filter(p => !rivalSubs.some(s => sameNamePerson(s.out, p.name)));
    const rEntered = (rivalLineup.substitutes || []).filter(p => rivalSubs.some(s => sameNamePerson(s.in, p.name)));
    rivalOnPitch = rOnPitch.concat(rEntered);
  }

  return { match, lineup, rivalName, rivalCode, rivalLineup, rivalOnPitch, onPitchSorted, stillOnBench, events: (live && live.events) || [] };
}

// Agrupamos jugadores por posición (arquero / defensa / mediocampo /
// ataque) para ubicarlos en líneas en la cancha — más simple y fiel a la
// alineación real que tratar de parsear el string de formación ("4-3-3").
function groupByLine(players) {
  const order = { G: 0, D: 1, M: 2, F: 3 };
  const lines = [[], [], [], []];
  (players || []).forEach(p => {
    const idx = order[(p.pos || '').toUpperCase()];
    lines[idx !== undefined ? idx : 2].push(p);
  });
  return lines.filter(l => l.length > 0);
}

// Calcula las posiciones (x,y en porcentaje del ancho/alto de la cancha)
// de cada jugador, con el arquero pegado al borde de su propio lado y las
// líneas avanzando hacia el centro.
function formationPositions(players, side) {
  const lines = groupByLine(players);
  const n = lines.length;
  if (n === 0) return [];
  const edgeX = side === 'left' ? 6 : 94;
  const centerX = side === 'left' ? 46 : 54;
  const positions = [];
  lines.forEach((linePlayers, li) => {
    const x = n === 1 ? edgeX : edgeX + (centerX - edgeX) * (li / (n - 1));
    linePlayers.forEach((p, pi) => {
      const y = (100 / (linePlayers.length + 1)) * (pi + 1);
      positions.push({ x, y, player: p });
    });
  });
  return positions;
}

// Busca si un jugador tiene tarjeta (amarilla o roja) entre los eventos
// del partido — viene del mismo endpoint que ya usamos para goles/cambios.
// Compara nombres por el conjunto de palabras, sin importar el orden —
// la API a veces devuelve "Apellido Nombre" en /events y "Nombre Apellido"
// en /lineups (pasa seguido con nombres coreanos, por ejemplo), así que una
// comparación de texto exacta fallaba y no encontraba la tarjeta.
function sameNamePerson(a, b) {
  if (!a || !b) return false;
  const norm = s => s.toLowerCase().split(/\s+/).filter(Boolean).sort().join(' ');
  return norm(a) === norm(b);
}

function cardForPlayer(events, name) {
  const cards = (events || []).filter(e => e.type === 'Card' && sameNamePerson(e.player, name));
  if (cards.length === 0) return null;
  if (cards.some(e => (e.detail || '').toLowerCase().includes('red'))) return 'red';
  return 'yellow';
}

function buildPitchSvg(myCode, data) {
  // El lado en la cancha respeta cómo se ve el partido en la tarjeta real
  // (local a la izquierda, visitante a la derecha) — no depende de cuál
  // país abriste el modal.
  const isHome = data.match && data.match.home === myCode;
  const mySide = isHome ? 'left' : 'right';
  const rivalSide = isHome ? 'right' : 'left';

  const myPositions = formationPositions(data.onPitchSorted, mySide);
  const rivalPositions = data.rivalOnPitch ? formationPositions(data.rivalOnPitch, rivalSide) : [];

  if (myPositions.length === 0) {
    return '<div class="ci-pitch-empty">' + t('alineacionNoDisponible') + '</div>';
  }

  const W = 760, H = 480;
  const dotR = 18;

  // clickable=true (mi equipo): color propio + link a Google.
  // clickable=false (rival): gris, sin link — para interactuar con el rival
  // hay que abrir su propio cuadro de país.
  function dotsFor(positions, color, clickable) {
    return positions.map(pos => {
      const cx = (pos.x / 100) * W;
      const cy = (pos.y / 100) * H;
      const fullName = pos.player.name;
      const nameParts = fullName.split(' ');
      const firstLine = nameParts[0];
      const secondLine = nameParts.slice(1).join(' ');
      const card = cardForPlayer(data.events, fullName);
      const cardHtml = card
        ? '<rect x="' + (cx + dotR * 0.45) + '" y="' + (cy - dotR * 1.55) + '" width="11" height="15" rx="2" ' +
          'fill="' + (card === 'red' ? '#E0263B' : '#FFD700') + '" stroke="#0a0a0a" stroke-width="1" transform="rotate(12 ' + (cx + dotR * 0.45 + 5.5) + ' ' + (cy - dotR * 1.55 + 7.5) + ')"/>'
        : '';
      const inner =
        '<circle cx="' + cx + '" cy="' + cy + '" r="' + dotR + '" fill="' + color + '" stroke="#0a0a0a" stroke-width="2"/>' +
        '<text x="' + cx + '" y="' + cy + '" text-anchor="middle" dominant-baseline="central" class="pitch-num">' + (pos.player.number ?? '') + '</text>' +
        '<text x="' + cx + '" y="' + (cy + dotR + 12) + '" text-anchor="middle" class="pitch-name">' + firstLine + '</text>' +
        (secondLine ? '<text x="' + cx + '" y="' + (cy + dotR + 24) + '" text-anchor="middle" class="pitch-name">' + secondLine + '</text>' : '') +
        cardHtml;
      if (clickable) {
        const link = googleSearchLink(fullName, myCode);
        return '<a href="' + link + '" target="_blank" rel="noopener" class="pitch-dot pitch-dot-clickable">' + inner + '</a>';
      }
      return '<g class="pitch-dot">' + inner + '</g>';
    }).join('');
  }

  const pitchSvg =
    '<svg class="pitch-svg" viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg">' +
      '<rect width="' + W + '" height="' + H + '" fill="#1e7d32"/>' +
      // franjas del césped
      Array.from({length:8}, (_, i) => '<rect x="' + (i*W/8) + '" y="0" width="' + (W/8) + '" height="' + H + '" fill="' + (i%2===0 ? 'rgba(255,255,255,0.04)' : 'transparent') + '"/>').join('') +
      // líneas de cancha
      '<rect x="2" y="2" width="' + (W-4) + '" height="' + (H-4) + '" fill="none" stroke="#fff" stroke-width="2" opacity="0.8"/>' +
      '<line x1="' + (W/2) + '" y1="0" x2="' + (W/2) + '" y2="' + H + '" stroke="#fff" stroke-width="2" opacity="0.8"/>' +
      '<circle cx="' + (W/2) + '" cy="' + (H/2) + '" r="60" fill="none" stroke="#fff" stroke-width="2" opacity="0.8"/>' +
      '<rect x="2" y="' + (H/2-90) + '" width="60" height="180" fill="none" stroke="#fff" stroke-width="2" opacity="0.8"/>' +
      '<rect x="' + (W-62) + '" y="' + (H/2-90) + '" width="60" height="180" fill="none" stroke="#fff" stroke-width="2" opacity="0.8"/>' +
      (rivalPositions.length > 0 ? dotsFor(rivalPositions, '#6b7280', false) : '') +
      dotsFor(myPositions, '#E0263B', true) +
    '</svg>';

  const rivalNote = rivalPositions.length === 0
    ? '<div class="ci-pitch-rival-note">' + t('alineacionRivalNoDisponible') + ' (' + data.rivalName + ')</div>'
    : '';

  return '<div class="ci-pitch-wrap">' + pitchSvg + rivalNote + '</div>';
}

// El modo cancha aplica cualquier vez que la pantalla sea más ancha que
// alta — sea PC, monitor, TV, o el celular rotado a horizontal. Así no
// dependemos de umbrales de píxeles que varían según el dispositivo.
let currentCountryModalState = null;
function isPitchLayout() {
  return window.innerWidth > window.innerHeight;
}
function rerenderLineupColumnIfOpen() {
  if (countryInfoModal.style.display === 'none' || !currentCountryModalState) return;
  const body = document.getElementById('ci-body');
  if (body) body.outerHTML = buildModalBodyHtml(currentCountryModalState.code, currentCountryModalState.lineupData);
}
window.addEventListener('orientationchange', rerenderLineupColumnIfOpen);
window.addEventListener('resize', rerenderLineupColumnIfOpen);

function playerRow(code, p) {
  const num = (p.number === null || p.number === undefined) ? '–' : p.number;
  const link = googleSearchLink(p.name, code);
  return '<div class="ci-player-row">' +
    '<span class="ci-player-num">' + num + '</span>' +
    '<a href="' + link + '" target="_blank" rel="noopener" class="ci-player-name">' + p.name + '</a>' +
    (p.inMinute !== null && p.inMinute !== undefined ? '<span class="ci-sub-tag">↳ ' + t('entroMin') + ' ' + p.inMinute + '\'</span>' : '') +
    (p.pos ? '<span class="ci-player-pos">' + p.pos + '</span>' : '') +
  '</div>';
}

function buildLineupHtml(code, data) {
  if (!data.match) {
    return '<div class="ci-lineup-empty">' + t('alineacionSinPartidos') + '</div>';
  }
  if (!data.lineup) {
    return '<div class="ci-lineup-meta">' + t('proximoRival') + ': <b>' + data.rivalName + '</b></div>' +
           '<div class="ci-lineup-empty">' + t('alineacionNoDisponible') + '</div>';
  }
  const lineup = data.lineup;
  const coachLink = lineup.coach ? googleSearchLink(lineup.coach, code) : null;
  let html = '<div class="ci-lineup-meta">' +
    '<span>' + t('proximoRival') + ': <b>' + data.rivalName + '</b></span>' +
    (lineup.formation ? '<span>' + t('formacion') + ': <b>' + lineup.formation + '</b></span>' : '') +
    (coachLink ? '<span>DT: <a href="' + coachLink + '" target="_blank" rel="noopener" class="ci-coach-link">' + lineup.coach + '</a></span>' : '') +
  '</div>';
  html += '<div class="ci-lineup-list">' + data.onPitchSorted.map(p => playerRow(code, p)).join('') + '</div>';
  return html;
}

function buildBenchHtml(code, data) {
  if (!data.match || !data.lineup) {
    return '<div class="ci-lineup-empty">' + t('alineacionNoDisponible') + '</div>';
  }
  if (data.stillOnBench.length === 0) {
    return '<div class="ci-lineup-empty">' + t('sinSuplentesDisponibles') + '</div>';
  }
  return '<div class="ci-lineup-list">' + data.stillOnBench.map(p => playerRow(code, p)).join('') + '</div>';
}

// Arma el cuerpo del modal (cancha+banco apilados de lado a lado, o las
// dos columnas de texto) según el modo vigente. Se llama tanto al abrir el
// modal como al rotar/cambiar tamaño de ventana mientras está abierto.
function buildModalBodyHtml(code, lineupData) {
  const pitchMode = isPitchLayout();
  if (pitchMode) {
    return '<div class="ci-body ci-body-pitch" id="ci-body">' +
      '<div class="ci-col-title">⚽ ' + t('alineacion') + '</div>' +
      buildPitchSvg(code, lineupData) +
      '<div class="ci-col-title" style="margin-top:14px;">' + t('banco') + '</div>' +
      buildBenchHtml(code, lineupData) +
    '</div>';
  }
  return '<div class="ci-body" id="ci-body">' +
    '<div class="ci-col">' +
      '<div class="ci-col-title">⚽ ' + t('alineacion') + '</div>' +
      '<div class="ci-col-scroll">' + buildLineupHtml(code, lineupData) + '</div>' +
    '</div>' +
    '<div class="ci-col">' +
      '<div class="ci-col-title">' + t('banco') + '</div>' +
      '<div class="ci-col-scroll">' + buildBenchHtml(code, lineupData) + '</div>' +
    '</div>' +
  '</div>';
}

function openCountryInfo(code, forcedMatchKey) {
  const name = esName(code);
  const flagHtml = flag(code);
  const code3 = countryCode(code);
  const stars = worldCupStars(code);
  const info = COUNTRY_INFO[code];

  // Si hay un partido relevante (en vivo, recién jugado, o el próximo) con
  // marcador disponible, lo mostramos al lado del nombre — en amarillo el
  // gol del país que estás mirando, en gris el del rival. El orden respeta
  // cómo se ve en la tarjeta real del partido (local izquierda, visitante
  // derecha), no cuál país abriste. Si nos llamaron desde una tarjeta
  // puntual, mostramos ESE partido — no "el más relevante en general".
  const relevantMatch = findRelevantLineupMatch(code, forcedMatchKey);
  let scoreHtml = '';
  let refereeHtml = '';
  if (relevantMatch) {
    const live = getLiveData(relevantMatch);
    if (live && live.homeGoals !== null && live.homeGoals !== undefined) {
      const isHome = relevantMatch.home === code;
      const myGoals = isHome ? live.homeGoals : live.awayGoals;
      const rivalGoals = isHome ? live.awayGoals : live.homeGoals;
      // Si se definió por penales, sumamos el resultado de la tanda entre
      // paréntesis — no se suma al marcador normal, es un dato aparte.
      let penSuffix = '';
      if (live.penaltyHome !== undefined && live.penaltyHome !== null) {
        const myPen = isHome ? live.penaltyHome : live.penaltyAway;
        const rivalPen = isHome ? live.penaltyAway : live.penaltyHome;
        penSuffix = ' <span class="ci-pen-suffix">(' + (isHome ? myPen + '-' + rivalPen : rivalPen + '-' + myPen) + ')</span>';
      }
      scoreHtml = isHome
        ? '<div class="ci-live-score"><span class="mine">' + myGoals + '</span> - <span class="rival">' + rivalGoals + '</span>' + penSuffix + '</div>'
        : '<div class="ci-live-score"><span class="rival">' + rivalGoals + '</span> - <span class="mine">' + myGoals + '</span>' + penSuffix + '</div>';
    }
    if (live && live.referee) {
      const refLink = googleSearchLink(live.referee, code);
      const refCode = refereeCountryCode(live.referee);
      const refName = live.referee.split(',')[0].trim();
      refereeHtml = '<div class="ci-referee">' + t('arbitro') + ': <a href="' + refLink + '" target="_blank" rel="noopener" class="ci-coach-link">' + refName + '</a>' + (refCode ? ' (' + refCode + ')' : '') + '</div>';
    }
  }

  let html = '<div class="ci-header">' + flagHtml.replace('flag-img', 'flag-img ci-flag-img') +
    '<div class="ci-header-text">' +
      '<div class="ci-name-row"><span class="ci-name">' + name + '</span><span class="ci-code">' + code3 + '</span></div>' +
      '<div class="ci-stars-row">' + stars + '</div>' +
    '</div>' +
    '<div class="ci-score-col">' + scoreHtml + refereeHtml + '</div>' +
  '</div>';

  if (info) {
    const regionLabel = (REGION_NAMES[currentLang] && REGION_NAMES[currentLang][info.region]) || info.region;
    html += '<div class="ci-region">📍 ' + t('regionLabel') + ': ' + regionLabel + '</div>' +
            '<div class="ci-stats-inline">' +
              '<span><b>' + info.appearances + '</b> ' + t('mundialesParticipados') + '</span>' +
              '<span><b>' + info.titles + '</b> ' + t('mundialesGanados') + '</span>' +
            '</div>' +
            '<div class="ci-disclaimer">' + t('datosAproximados') + '</div>';
  } else {
    html += '<div class="ci-disclaimer">' + t('datosNoDisponibles') + '</div>';
  }

  const lineupData = getLineupData(code, forcedMatchKey);
  currentCountryModalState = { code, lineupData };
  html += buildModalBodyHtml(code, lineupData);

  countryInfoContent.innerHTML = html;
  countryInfoModal.style.display = 'flex';
  // Agregamos una entrada al historial — así el botón "atrás" del celular
  // (o el gesto equivalente) cierra el modal en vez de salir de la página.
  history.pushState({ modal: 'country-info' }, '');
}

// Cierra el modal. Si fuimos nosotros quienes empujamos la entrada al
// historial al abrirlo, retrocedemos un paso (eso dispara 'popstate', que
// también oculta el modal) para no dejar entradas "fantasma" en el historial.
function closeCountryInfo() {
  if (countryInfoModal.style.display === 'none') return;
  if (history.state && history.state.modal === 'country-info') {
    history.back();
  } else {
    countryInfoModal.style.display = 'none';
  }
}
countryInfoClose.addEventListener('click', closeCountryInfo);
countryInfoModal.addEventListener('click', (e) => {
  if (e.target === countryInfoModal) closeCountryInfo();
});

// ── Zoom de tablita de grupo ─────────────────────────────────────────────
const groupZoomModal = document.getElementById('group-zoom-modal');
const groupZoomContent = document.getElementById('group-zoom-content');
const groupZoomClose = document.getElementById('group-zoom-close');

function openGroupZoom(g) {
  groupZoomContent.innerHTML = buildSingleGroupCardHtml(g);
  groupZoomModal.style.display = 'flex';
  history.pushState({ modal: 'group-zoom' }, '');
}
function closeGroupZoom() {
  if (groupZoomModal.style.display === 'none') return;
  if (history.state && history.state.modal === 'group-zoom') {
    history.back();
  } else {
    groupZoomModal.style.display = 'none';
  }
}
groupZoomClose.addEventListener('click', closeGroupZoom);
groupZoomModal.addEventListener('click', (e) => {
  if (e.target === groupZoomModal) closeGroupZoom();
});

window.addEventListener('popstate', (e) => {
  // Llega tanto al usar el botón "atrás" físico/del navegador como al
  // llamar nosotros a history.back() — en ambos casos, solo ocultamos.
  if (countryInfoModal.style.display !== 'none') {
    countryInfoModal.style.display = 'none';
  }
  if (installConfirmModal.style.display !== 'none') {
    installConfirmModal.style.display = 'none';
  }
  if (groupZoomModal.style.display !== 'none') {
    groupZoomModal.style.display = 'none';
  }
});
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Escape') return;
  if (countryInfoModal.style.display !== 'none') closeCountryInfo();
  if (installConfirmModal.style.display !== 'none') closeInstallConfirm();
  if (groupZoomModal.style.display !== 'none') closeGroupZoom();
});


window.addEventListener('appinstalled', () => {
  settingsMenuWrap.style.display = 'none';
  deferredInstallPrompt = null;
});


if ('Notification' in window && Notification.permission === 'default') {
  document.addEventListener('click', function requestPerm() {
    Notification.requestPermission();
    document.removeEventListener('click', requestPerm);
  }, { once: true });
}


// ── Cast TV ────────────────────────────────────────────────────────────────
// La Cast Sender SDK NO funciona en modo standalone PWA (limitación de Chrome).
// Solución: el botón abre remote.html en el browser externo como Sender.
// remote.html tiene su propia SDK y controla la TV directamente.
// El botón en la app solo sirve de acceso rápido + indicador de estado visual.

const castTvBtn = document.getElementById('cast-tv-btn');

// Mostrar el botón siempre (la TV con Cast built-in no requiere SDK para detectar)
castTvBtn.style.display = 'flex';

// Estado de casting persistido en sessionStorage
// (para que el botón quede amarillo si el usuario volvió de remote.html)
function getCastState() {
  return sessionStorage.getItem('castActive') === '1';
}
function setCastState(active) {
  if (active) sessionStorage.setItem('castActive', '1');
  else sessionStorage.removeItem('castActive');
}

// Sincronizar estado visual al cargar
if (getCastState()) {
  castTvBtn.classList.add('casting');
  castTvBtn.title = 'Transmitiendo en TV — tocá para controlar';
}

// Escuchar mensajes de remote.html via BroadcastChannel
const castChannel = new BroadcastChannel('fixture-cast');
castChannel.addEventListener('message', (e) => {
  if (e.data === 'cast-started') {
    setCastState(true);
    castTvBtn.classList.add('casting');
    castTvBtn.title = 'Transmitiendo en TV — tocá para controlar';
  } else if (e.data === 'cast-ended') {
    setCastState(false);
    castTvBtn.classList.remove('casting');
    castTvBtn.title = 'Ver en TV';
  }
});

castTvBtn.addEventListener('click', () => {
  // Abrir remote.html en browser externo (funciona desde PWA standalone)
  // target="_blank" con rel="noopener" abre en el browser del sistema
  const remote = window.open('https://fixture.rolagaard.com/remote.html', '_blank', 'noopener');
  if (!remote) {
    // Si el popup fue bloqueado, navegar directamente
    window.location.href = 'https://fixture.rolagaard.com/remote.html';
  }
});

applyTranslations();

</script>
