name: Update World Cup Squads

# Las plantillas no cambian cada 10 minutos como los resultados — alcanza con
# correrlo una vez al día (y manualmente cuando quieras forzar una actualización,
# por ejemplo si la FIFA confirma cambios de último momento en alguna convocatoria).
on:
  schedule:
    - cron: '0 9 * * *'   # Una vez por día, 09:00 UTC (06:00 hs AR aprox.)
  workflow_dispatch: {}

jobs:
  update-squads:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch squads for every team in the World Cup
        env:
          API_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          python3 << 'EOF'
          import json
          import time
          import unicodedata
          import urllib.request
          from datetime import datetime

          API_KEY = "${{ secrets.API_FOOTBALL_KEY }}"
          BASE = "https://v3.football.api-sports.io"
          HEADERS = {"x-apisports-key": API_KEY}

          def strip_accents(s):
              return ''.join(c for c in unicodedata.normalize('NFD', s) if unicodedata.category(c) != 'Mn').upper()

          # Mismos alias que usa update-scores.yml, para que las claves coincidan
          # con los nombres internos que usa el sitio (SCHEDULE).
          NAME_ALIASES = {
              'CAPE VERDE ISLANDS': 'CAPE VERDE',
              'IVORY COAST': 'IVORY COAST',
              'COTE DIVOIRE': 'IVORY COAST',
              'DR CONGO': 'CONGO DR',
              'CONGO DR': 'CONGO DR',
              'REPUBLIC OF IRELAND': 'IRELAND',
              'SOUTH KOREA': 'SOUTH KOREA',
              'KOREA REPUBLIC': 'SOUTH KOREA',
              'USA': 'USA',
              'UNITED STATES': 'USA',
              'BOSNIA AND HERZEGOVINA': 'BOSNIA & HERZEGOVINA',
          }

          def normalize_team(name):
              clean = strip_accents(name)
              return NAME_ALIASES.get(clean, clean)

          def api_get(path):
              url = f"{BASE}{path}"
              req = urllib.request.Request(url, headers=HEADERS)
              with urllib.request.urlopen(req, timeout=15) as resp:
                  return json.loads(resp.read())

          # 1) Traemos la lista real de equipos participantes del torneo
          #    (en vez de hardcodear IDs, evitamos errores de mapeo).
          teams_resp = api_get("/teams?league=1&season=2026")
          teams = teams_resp.get('response', [])
          print(f"Equipos encontrados: {len(teams)}")

          squads = {}
          for entry in teams:
              team = entry.get('team', {})
              team_id = team.get('id')
              team_name_raw = team.get('name', '')
              key = normalize_team(team_name_raw)
              if not team_id:
                  continue

              try:
                  squad_resp = api_get(f"/players/squads?team={team_id}")
                  squad_list = squad_resp.get('response', [])
                  players = []
                  if squad_list:
                      for p in squad_list[0].get('players', []):
                          players.append({
                              'name': p.get('name'),
                              'number': p.get('number'),
                              'position': p.get('position'),
                          })
                  squads[key] = players
                  print(f"{key}: {len(players)} jugadores")
              except Exception as e:
                  print(f"No se pudo traer plantilla de {key} (id {team_id}): {e}")
                  squads[key] = []

              # Respetamos rate limits de la API entre llamadas
              time.sleep(0.5)

          output = {
              'updated': datetime.utcnow().isoformat() + 'Z',
              'squads': squads,
          }

          with open('squads.json', 'w') as f:
              json.dump(output, f, indent=2, ensure_ascii=False)

          print(f"Wrote squads for {len(squads)} teams to squads.json")
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add squads.json
          git diff --staged --quiet || git commit -m "Update squads [automated]"
          git push
