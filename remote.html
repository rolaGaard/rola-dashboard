<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fixture rolaGaard — Control Remoto TV</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background:#0a0e1a; color:#fff;
  font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height:100vh; display:flex; flex-direction:column;
  user-select:none; overscroll-behavior:none;
}

/* ── PANTALLA INICIAL ── */
.screen { display:none; flex-direction:column; height:100vh; }
.screen.active { display:flex; }

/* ── PANTALLA: CONECTAR ── */
.connect-screen {
  align-items:center; justify-content:center;
  gap:28px; padding:32px 24px; text-align:center;
}
.connect-logo {
  width:96px; height:96px; border-radius:22.5%;
  box-shadow:0 0 0 3px #FFD700;
}
.connect-title { font-size:24px; font-weight:800; }
.connect-sub { font-size:14px; color:#64748b; line-height:1.6; max-width:280px; }
.connect-btn {
  display:flex; align-items:center; justify-content:center; gap:12px;
  width:100%; max-width:280px; padding:16px;
  background:#FFD700; color:#0a0a0a;
  border:none; border-radius:14px;
  font-size:17px; font-weight:800; cursor:pointer; font-family:inherit;
}
.connect-btn:disabled { background:#2a2a2a; color:#64748b; cursor:not-allowed; }
.connect-btn svg { width:24px; height:24px; fill:currentColor; flex-shrink:0; }
.connect-status { font-size:13px; color:#64748b; min-height:20px; }
.connect-status.error { color:#f87171; }
.connect-status.ok { color:#22c55e; }

/* ── PANTALLA: CONTROL REMOTO ── */
.remote-screen { flex-direction:column; }

.remote-header {
  background:#0a0a0a; border-bottom:1px solid #1f1f1f;
  padding:14px 20px;
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0;
}
.remote-header-left { display:flex; align-items:center; gap:12px; }
.remote-logo { width:40px; height:40px; border-radius:22.5%; box-shadow:0 0 0 2px #FFD700; }
.remote-title { font-size:15px; font-weight:800; }
.remote-tv-name { font-size:11px; color:#64748b; margin-top:1px; }
.remote-status {
  display:flex; align-items:center; gap:6px;
  font-size:12px; font-weight:700; color:#22c55e;
}
.remote-status-dot {
  width:8px; height:8px; border-radius:50%; background:#22c55e;
  animation:rdot 2s infinite ease-in-out;
}
@keyframes rdot { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── FILTROS ── */
.remote-section { font-size:10px; font-weight:800; color:#64748b;
  letter-spacing:.08em; padding:12px 20px 6px; flex-shrink:0; }
.remote-filters {
  display:grid; grid-template-columns:repeat(4,1fr); gap:8px;
  padding:0 16px 8px; flex-shrink:0;
}
.remote-filter {
  background:#111827; border:1px solid #1f2937; border-radius:10px;
  padding:10px 4px; font-size:11px; font-weight:700; color:#94a3b8;
  cursor:pointer; font-family:inherit; text-align:center;
  display:flex; flex-direction:column; align-items:center; gap:4px;
  transition:all .12s;
}
.remote-filter.active { background:#003087; border-color:#FFD700; color:#FFD700; }
.remote-filter:active { transform:scale(.93); }
.remote-filter-icon { font-size:18px; }

/* ── TRACKPAD ── */
.remote-trackpad-wrap {
  flex:1; display:flex; flex-direction:column;
  gap:8px; padding:0 16px 12px; min-height:0;
}
.remote-trackpad {
  flex:1; min-height:140px;
  background:#111827; border:1px solid #1f2937; border-radius:14px;
  position:relative; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  touch-action:none;
}
.remote-trackpad-hint { color:#2a3a50; font-size:13px; font-weight:700;
  text-align:center; pointer-events:none; line-height:1.7; }
.remote-finger {
  position:absolute; width:44px; height:44px; border-radius:50%;
  background:rgba(255,215,0,.15); border:2px solid #FFD700;
  transform:translate(-50%,-50%); pointer-events:none;
  opacity:0; transition:opacity .15s;
}
.remote-trackpad.touching .remote-finger { opacity:1; }

.remote-scroll-btns {
  display:grid; grid-template-columns:1fr 1fr; gap:8px; flex-shrink:0;
}
.remote-scroll-btn {
  background:#111827; border:1px solid #1f2937; border-radius:10px;
  padding:12px; font-size:18px; color:#94a3b8;
  cursor:pointer; text-align:center; font-family:inherit; transition:all .1s;
}
.remote-scroll-btn:active { background:#1e2a3a; transform:scale(.94); }

.remote-disconnect {
  margin:0 0 4px; padding:11px;
  background:rgba(220,38,38,.1); color:#f87171;
  border:1px solid rgba(220,38,38,.3); border-radius:10px;
  font-size:13px; font-weight:700; cursor:pointer; font-family:inherit;
  flex-shrink:0; transition:background .15s;
}
.remote-disconnect:active { background:rgba(220,38,38,.22); }
</style>
</head>
<body>

<!-- PANTALLA 1: CONECTAR -->
<div class="screen connect-screen active" id="screen-connect">
  <img class="connect-logo" src="icons/icon-512.png" alt="rolaGaard">
  <div class="connect-title">Control Remoto TV</div>
  <div class="connect-sub">Conectate al Chromecast de tu TV para controlar el Mundial 2026 desde acá.</div>
  <button class="connect-btn" id="connect-btn">
    <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v3h2V5h18v14h-7v2h7c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM1 18v3h3c0-1.66-1.34-3-3-3zm0-4v2c2.76 0 5 2.24 5 5h2c0-3.87-3.13-7-7-7zm0-4v2c4.97 0 9 4.03 9 9h2c0-6.08-4.93-11-11-11z"/></svg>
    Conectar a TV
  </button>
  <div class="connect-status" id="connect-status">Buscando dispositivos Cast...</div>
  <div id="debug-log" style="margin-top:16px;font-size:11px;color:#64748b;text-align:left;width:100%;max-width:300px;background:#111827;border-radius:8px;padding:10px;line-height:1.8;word-break:break-all;"></div>
</div>

<!-- PANTALLA 2: CONTROL REMOTO -->
<div class="screen remote-screen" id="screen-remote">
  <div class="remote-header">
    <div class="remote-header-left">
      <img class="remote-logo" src="icons/icon-512.png" alt="">
      <div>
        <div class="remote-title">Control Remoto</div>
        <div class="remote-tv-name" id="remote-tv-name">TV</div>
      </div>
    </div>
    <div class="remote-status">
      <div class="remote-status-dot"></div>
      En vivo
    </div>
  </div>

  <div class="remote-section">FILTROS</div>
  <div class="remote-filters">
    <button class="remote-filter active" data-f="all"><span class="remote-filter-icon">📋</span>Todos</button>
    <button class="remote-filter" data-f="today"><span class="remote-filter-icon">📅</span>Hoy</button>
    <button class="remote-filter" data-f="live"><span class="remote-filter-icon">🔴</span>En vivo</button>
    <button class="remote-filter" data-f="finished"><span class="remote-filter-icon">✅</span>Jugados</button>
    <button class="remote-filter" data-f="scheduled"><span class="remote-filter-icon">🕐</span>Próximos</button>
    <button class="remote-filter" data-f="fixture"><span class="remote-filter-icon">🏆</span>Fixture</button>
    <button class="remote-filter" data-f="paises"><span class="remote-filter-icon">🌍</span>Países</button>
    <button class="remote-filter" data-f="stats"><span class="remote-filter-icon">📊</span>Stats</button>
  </div>

  <div class="remote-section">TRACKPAD — deslizá para hacer scroll en la TV</div>
  <div class="remote-trackpad-wrap">
    <div class="remote-trackpad" id="remote-trackpad">
      <div class="remote-trackpad-hint">↕ Deslizá el dedo<br>para hacer scroll en la TV</div>
      <div class="remote-finger" id="remote-finger"></div>
    </div>
    <div class="remote-scroll-btns">
      <button class="remote-scroll-btn" id="scroll-up">↑ Arriba</button>
      <button class="remote-scroll-btn" id="scroll-down">↓ Abajo</button>
    </div>
    <button class="remote-disconnect" id="remote-disconnect">⏹ Desconectar de TV</button>
  </div>
</div>

<!-- Cast Sender SDK — se carga en el browser, no en la PWA -->
<script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
<script>
const APP_ID    = 'CEC8990A';
const NAMESPACE = 'urn:x-cast:com.rolagaard.fixture';

// BroadcastChannel para comunicar estado a la app PWA
const castChannel = new BroadcastChannel('fixture-cast');

let castSession = null;

// ── Elementos ─────────────────────────────────────────────────────────────────
const screenConnect = document.getElementById('screen-connect');
const screenRemote  = document.getElementById('screen-remote');
const connectBtn    = document.getElementById('connect-btn');
const connectStatus = document.getElementById('connect-status');
const remoteTvName  = document.getElementById('remote-tv-name');
const trackpad      = document.getElementById('remote-trackpad');
const finger        = document.getElementById('remote-finger');

// ── Cast SDK init ─────────────────────────────────────────────────────────────
function dbg(msg) {
  const el = document.getElementById('debug-log');
  if (el) el.innerHTML += (new Date().toLocaleTimeString()) + ' ' + msg + '<br>';
  console.log('[Cast]', msg);
}

window['__onGCastApiAvailable'] = function(isAvailable) {
  dbg('API available: ' + isAvailable);
  if (!isAvailable) {
    connectStatus.textContent = 'Cast no disponible en este browser.';
    connectStatus.className = 'connect-status error';
    connectBtn.disabled = true;
    dbg('ERROR: Cast no disponible');
    return;
  }

  const options = new cast.framework.CastOptions();
  options.receiverApplicationId = APP_ID;
  options.autoJoinPolicy = chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED;
  cast.framework.CastContext.getInstance().setOptions(options);

  connectStatus.textContent = 'Listo. Tocá "Conectar a TV".';
  connectStatus.className = 'connect-status ok';
  dbg('SDK lista ✅');

  cast.framework.CastContext.getInstance().addEventListener(
    cast.framework.CastContextEventType.SESSION_STATE_CHANGED,
    onSessionStateChanged
  );

  // Si ya hay una sesión activa (reconexión automática), usarla
  const existing = cast.framework.CastContext.getInstance().getCurrentSession();
  if (existing) {
    dbg('Sesión existente detectada');
    castSession = existing;
    showRemoteScreen(castSession.getCastDevice()?.friendlyName || 'TV');
  } else {
    dbg('Sin sesión previa');
  }
};

function onSessionStateChanged(event) {
  const S = cast.framework.SessionState;
  const state = event.sessionState;

  dbg('Estado sesión: ' + state);
  if (state === S.SESSION_STARTED || state === S.SESSION_RESUMED) {
    try {
      castSession = cast.framework.CastContext.getInstance().getCurrentSession();
      let tvName = 'TV';
      try { tvName = castSession.getCastDevice().friendlyName || 'TV'; } catch(e) {}
      showRemoteScreen(tvName);
      try { castChannel.postMessage('cast-started'); } catch(e) {}
      // Sincronizar filtro activo
      send({ type:'filter', value:'all' });
    } catch(err) {
      console.error('Session error:', err);
      connectStatus.textContent = 'Error al conectar: ' + err;
      connectStatus.className = 'connect-status error';
    }
  } else if (state === S.SESSION_ENDED) {
    castSession = null;
    showConnectScreen();
    try { castChannel.postMessage('cast-ended'); } catch(e) {}
  }
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function showRemoteScreen(tvName) {
  screenConnect.style.display = 'none';
  screenRemote.style.display = 'flex';
  screenConnect.classList.remove('active');
  screenRemote.classList.add('active');
  remoteTvName.textContent = tvName || 'TV';
}
function showConnectScreen() {
  screenRemote.style.display = 'none';
  screenConnect.style.display = 'flex';
  screenRemote.classList.remove('active');
  screenConnect.classList.add('active');
}

// ── Conectar ──────────────────────────────────────────────────────────────────
connectBtn.addEventListener('click', () => {
  connectStatus.textContent = 'Buscando TV...';
  connectStatus.className = 'connect-status';
  dbg('Iniciando requestSession...');
  cast.framework.CastContext.getInstance().requestSession()
    .catch(err => {
      dbg('requestSession error: ' + JSON.stringify(err));
      if (err === 'cancel') {
        connectStatus.textContent = 'Cancelado.';
      } else {
        connectStatus.textContent = 'Error al conectar. Intentá de nuevo.';
        connectStatus.className = 'connect-status error';
      }
    });
});

// ── Desconectar ───────────────────────────────────────────────────────────────
document.getElementById('remote-disconnect').addEventListener('click', () => {
  cast.framework.CastContext.getInstance().endCurrentSession(true);
});

// ── Filtros ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.remote-filter').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.remote-filter').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    send({ type:'filter', value: btn.dataset.f });
  });
});

// ── Scroll rápido ─────────────────────────────────────────────────────────────
document.getElementById('scroll-up').addEventListener('click',   () => send({ type:'scroll', delta:-300 }));
document.getElementById('scroll-down').addEventListener('click', () => send({ type:'scroll', delta:300 }));

// ── Trackpad ──────────────────────────────────────────────────────────────────
let lastY = null, scrollThrottle = null;

trackpad.addEventListener('pointerdown', e => {
  trackpad.setPointerCapture(e.pointerId);
  lastY = e.clientY;
  trackpad.classList.add('touching');
  moveFinger(e);
});
trackpad.addEventListener('pointermove', e => {
  if (lastY === null) return;
  moveFinger(e);
  const dy = e.clientY - lastY;
  lastY = e.clientY;
  if (!scrollThrottle) {
    scrollThrottle = setTimeout(() => { scrollThrottle = null; }, 50);
    send({ type:'scroll', delta: dy * 2.5 });
  }
});
trackpad.addEventListener('pointerup',     () => { lastY = null; trackpad.classList.remove('touching'); });
trackpad.addEventListener('pointercancel', () => { lastY = null; trackpad.classList.remove('touching'); });

function moveFinger(e) {
  const r = trackpad.getBoundingClientRect();
  finger.style.left = (e.clientX - r.left) + 'px';
  finger.style.top  = (e.clientY - r.top)  + 'px';
}

// ── Enviar mensaje a TV ───────────────────────────────────────────────────────
function send(msg) {
  if (!castSession) return;
  castSession.sendMessage(NAMESPACE, msg)
    .catch(err => console.error('send error:', err));
}
</script>
</body>
</html>
