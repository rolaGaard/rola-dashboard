name: Update World Cup Scores

on:
  schedule:
    # Runs every 10 minutes, but only during match window (16:00-08:00 UTC = 13:00-05:00 AR)
    # GitHub Actions cron is UTC. We run every 10 min across the full day window
    # and the script itself decides whether AR time is within match hours.
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check if within match window (13:00-05:00 AR)
        id: check_window
        run: |
          AR_HOUR=$(TZ="America/Argentina/Buenos_Aires" date +%H)
          echo "Current AR hour: $AR_HOUR"
          # Match window: 13:00 to 23:59, OR 00:00 to 05:00
          if [ "$AR_HOUR" -ge 13 ] || [ "$AR_HOUR" -lt 5 ]; then
            echo "in_window=true" >> "$GITHUB_OUTPUT"
          else
            echo "in_window=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch World Cup scores
        if: steps.check_window.outputs.in_window == 'true'
        env:
          API_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          # FIFA World Cup 2026 league id = 1 (verify in api docs), season = 2026
          # Get today's fixtures for the World Cup
          curl -s -H "x-apisports-key: $API_KEY" \
            "https://v3.football.api-sports.io/fixtures?league=1&season=2026" \
            -o raw_fixtures.json

          # Parse into our simplified scores.json format using python
          python3 << 'EOF'
          import json
          import urllib.request
          import unicodedata
          from datetime import datetime

          def strip_accents(s):
              return ''.join(c for c in unicodedata.normalize('NFD', s) if unicodedata.category(c) != 'Mn').upper()

          # The API sometimes uses different team name variants than our SCHEDULE.
          # Map any known alias to the exact name used in SCHEDULE (after accent stripping).
          NAME_ALIASES = {
              'CAPE VERDE ISLANDS': 'CAPE VERDE',
              'IVORY COAST': 'IVORY COAST',
              'COTE DIVOIRE': 'IVORY COAST',
              'DR CONGO': 'CONGO DR',
              'CONGO DR': 'CONGO DR',
              'REPUBLIC OF IRELAND': 'IRELAND',
              'SOUTH KOREA': 'SOUTH KOREA',
              'KOREA REPUBLIC': 'SOUTH KOREA',
              'USA': 'USA',
              'UNITED STATES': 'USA',
              'BOSNIA AND HERZEGOVINA': 'BOSNIA & HERZEGOVINA',
          }

          def normalize_team(name):
              clean = strip_accents(name)
              return NAME_ALIASES.get(clean, clean)

          with open('raw_fixtures.json') as f:
              data = json.load(f)

          API_KEY = "${{ secrets.API_FOOTBALL_KEY }}"
          LIVE_STATUSES = {'1H', '2H', 'HT', 'ET', 'BT', 'P'}
          FINISHED_STATUSES = {'FT', 'AET', 'PEN'}

          def fetch_events(fixture_id):
              url = f"https://v3.football.api-sports.io/fixtures/events?fixture={fixture_id}"
              req = urllib.request.Request(url, headers={"x-apisports-key": API_KEY})
              try:
                  with urllib.request.urlopen(req, timeout=10) as resp:
                      body = json.loads(resp.read())
                  events = []
                  for ev in body.get('response', []):
                      etype = ev.get('type')  # Goal, Card, subst, Var
                      detail = ev.get('detail')  # Normal Goal, Yellow Card, Red Card, etc
                      player = (ev.get('player') or {}).get('name')
                      team = normalize_team((ev.get('team') or {}).get('name', ''))
                      minute = (ev.get('time') or {}).get('elapsed')
                      extra = (ev.get('time') or {}).get('extra')
                      if etype in ('Goal', 'Card'):
                          events.append({
                              'type': etype,
                              'detail': detail,
                              'player': player,
                              'team': team,
                              'minute': minute,
                              'extra': extra,
                          })
                  return events
              except Exception as e:
                  print(f"Could not fetch events for fixture {fixture_id}: {e}")
                  return []

          scores = {}
          for fx in data.get('response', []):
              fixture = fx['fixture']
              teams = fx['teams']
              goals = fx['goals']
              home = normalize_team(teams['home']['name'])
              away = normalize_team(teams['away']['name'])
              key = home + '-' + away
              status = fixture['status']['short']

              entry = {
                  'homeGoals': goals['home'],
                  'awayGoals': goals['away'],
                  'status': status,
                  'elapsed': fixture['status'].get('elapsed'),
                  'kickoffUTC': fixture.get('date'),
              }

              # Only fetch events (goals/cards) for matches that are live or finished,
              # to avoid wasting API quota on matches that haven't started.
              if status in LIVE_STATUSES or status in FINISHED_STATUSES:
                  entry['events'] = fetch_events(fixture['id'])

              scores[key] = entry

          output = {
              'updated': datetime.utcnow().isoformat() + 'Z',
              'matches': scores
          }

          with open('scores.json', 'w') as f:
              json.dump(output, f, indent=2)

          print(f"Wrote {len(scores)} matches to scores.json")
          EOF

      - name: Commit and push if changed
        if: steps.check_window.outputs.in_window == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scores.json
          git diff --staged --quiet || git commit -m "Update scores [automated]"
          git pull --rebase origin main
          git push
