<script>
// в”Ђв”Ђ Constantes в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const APP_ID = 'CEC8990A';
const SCORES_URL = 'https://fixture.rolagaard.com/scores.json';
const POLL_INTERVAL = 30000; // 30 seg

// в”Ђв”Ђ Estado в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
let scoresData = [];
let currentFilter = 'all';
let scrollY = 0;

// в”Ђв”Ђ Cast Receiver в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const context = cast.framework.CastReceiverContext.getInstance();
const playerManager = context.getPlayerManager();

context.addCustomMessageListener('urn:x-cast:com.rolagaard.fixture', (event) => {
  const msg = event.data;
  if (!msg || !msg.type) return;

  if (msg.type === 'filter') {
    currentFilter = msg.value;
    render();
  } else if (msg.type === 'scroll') {
    const content = document.getElementById('tv-content');
    content.scrollTop += msg.delta;
    showScrollIndicator();
  } else if (msg.type === 'zoom') {
    // zoom futuro: escalar el contenido
  }
});

context.addEventListener(cast.framework.system.EventType.READY, () => {
  document.getElementById('tv-connecting').style.display = 'none';
  document.getElementById('tv-header').style.display = 'flex';
  document.getElementById('tv-content').style.display = 'block';
  loadData();
});

context.start({ disableIdleTimeout: true });

// в”Ђв”Ђ Reloj в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function updateClock() {
  const now = new Date();
  document.getElementById('tv-clock').textContent =
    now.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
}
updateClock();
setInterval(updateClock, 1000);

// в”Ђв”Ђ Carga de datos в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function loadData() {
  try {
    const r = await fetch(SCORES_URL + '?t=' + Date.now());
    const json = await r.json();

    // scores.json tiene estructura: { updated, matches: { "HOME-AWAY": {...} } }
    const raw = json.matches || json.fixtures || json || {};
    if (Array.isArray(raw)) {
      scoresData = raw;
    } else {
      // Convertir diccionario HOME-AWAY a array con home_name/away_name
      scoresData = Object.entries(raw).map(([key, m]) => {
        const parts = key.split('-');
        // La clave puede tener guiones en los nombres (ej. BOSNIA & HERZEGOVINA)
        // La API usa HOME-AWAY donde HOME y AWAY son los nombres en mayГєsculas
        // Usamos el campo team de los eventos para inferir, o simplemente splitteamos por el primer guion que separa equipos
        // Mejor: buscar en eventos quГ© equipos hay
        let home_name = m.home || '';
        let away_name = m.away || '';
        if (!home_name && !away_name) {
          // Inferir desde la clave: buscar equipos en eventos
          const teams = [...new Set((m.events || []).map(e => e.team).filter(Boolean))];
          if (teams.length >= 2) {
            home_name = teams[0];
            away_name = teams[1];
          } else {
            // Fallback: split por primer '-' no ideal pero funciona para mayorГ­a
            const idx = key.indexOf('-');
            home_name = idx > -1 ? key.slice(0, idx) : key;
            away_name = idx > -1 ? key.slice(idx + 1) : '';
          }
        }
        return {
          ...m,
          matchKey: key,
          home_name: home_name || key.split('-')[0],
          away_name: away_name || key.split('-').slice(1).join('-'),
          home_goals: m.homeGoals,
          away_goals: m.awayGoals,
          kickoff: m.kickoffUTC,
          date: m.kickoffUTC,
          group: m.round || '',
        };
      });
    }
    render();
  } catch(e) {
    console.error('TV: error cargando scores.json', e);
  }
}
setInterval(loadData, POLL_INTERVAL);

// в”Ђв”Ђ Helpers в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const STATUS_LIVE = ['1H','HT','2H','ET','BT','P'];
const STATUS_DONE = ['FT','AET','PEN'];

function isLive(m) { return STATUS_LIVE.includes(m.status); }
function isDone(m) { return STATUS_DONE.includes(m.status); }
function isNS(m)   { return m.status === 'NS'; }

function statusLabel(m) {
  if (m.status === 'FT' || m.status === 'AET' || m.status === 'PEN') return 'FINALIZADO';
  if (m.status === 'HT') return 'ENTRETIEMPO';
  if (m.status === 'BT') return 'DESCANSO ET';
  if (m.status === 'P')  return 'PENALES';
  if (m.status === '1H') return (m.elapsed || '') + "'";
  if (m.status === '2H') return (m.elapsed === 99 ? '90+9\'' : (m.elapsed || '') + "'");
  if (m.status === 'ET') return 'T. EXTRA ' + (m.elapsed || '') + "'";
  if (m.status === 'NS') {
    const d = new Date(m.kickoff || m.date);
    return d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  }
  return m.status;
}

  const map = {
    'ARG':'рџ‡¦рџ‡·','BRA':'рџ‡§рџ‡·','FRA':'рџ‡«рџ‡·','GER':'рџ‡©рџ‡Є','ESP':'рџ‡Єрџ‡ё','ITA':'рџ‡®рџ‡№',
    'ENG':'рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї','POR':'рџ‡µрџ‡№','NED':'рџ‡ірџ‡±','BEL':'рџ‡§рџ‡Є','URU':'рџ‡єрџ‡ѕ','COL':'рџ‡Ёрџ‡ґ',
    'MEX':'рџ‡Ірџ‡Ѕ','USA':'рџ‡єрџ‡ё','CAN':'рџ‡Ёрџ‡¦','JAP':'рџ‡Їрџ‡µ','KOR':'рџ‡°рџ‡·','MAR':'рџ‡Ірџ‡¦',
    'SEN':'рџ‡ёрџ‡і','GHA':'рџ‡¬рџ‡­','CIV':'рџ‡Ёрџ‡®','NGA':'рџ‡ірџ‡¬','CMR':'рџ‡Ёрџ‡І','TUN':'рџ‡№рџ‡і',
    'EGY':'рџ‡Єрџ‡¬','ALG':'рџ‡©рџ‡ї','AUS':'рџ‡¦рџ‡є','NZL':'рџ‡ірџ‡ї','IRN':'рџ‡®рџ‡·','KSA':'рџ‡ёрџ‡¦',
    'QAT':'рџ‡¶рџ‡¦','UAE':'рџ‡¦рџ‡Є','JOR':'рџ‡Їрџ‡ґ','IRQ':'рџ‡®рџ‡¶','SYR':'рџ‡ёрџ‡ѕ','UZB':'рџ‡єрџ‡ї',

    'POL':'рџ‡µрџ‡±','CRO':'рџ‡­рџ‡·','SVK':'рџ‡ёрџ‡°','CZE':'рџ‡Ёрџ‡ї','HUN':'рџ‡­рџ‡є','ROU':'рџ‡·рџ‡ґ',
    'SRB':'рџ‡·рџ‡ё','UKR':'рџ‡єрџ‡¦','AUT':'рџ‡¦рџ‡№','SUI':'рџ‡Ёрџ‡­','DEN':'рџ‡©рџ‡°','SWE':'рџ‡ёрџ‡Є',
    'NOR':'рџ‡ірџ‡ґ','FIN':'рџ‡«рџ‡®','SCO':'рџЏґу Ѓ§у Ѓўу Ѓіу ЃЈу Ѓґу Ѓї','WAL':'рџЏґу Ѓ§у Ѓўу Ѓ·у Ѓ¬у Ѓіу Ѓї','IRL':'рџ‡®рџ‡Є','GRE':'рџ‡¬рџ‡·',
    'TUR':'рџ‡№рџ‡·','RUS':'рџ‡·рџ‡є','CHI':'рџ‡Ёрџ‡±','ECU':'рџ‡Єрџ‡Ё','PER':'рџ‡µрџ‡Є','BOL':'рџ‡§рџ‡ґ',
    'PAR':'рџ‡µрџ‡ѕ','VEN':'рџ‡»рџ‡Є','PAN':'рџ‡µрџ‡¦','CRC':'рџ‡Ёрџ‡·','HON':'рџ‡­рџ‡і','GTM':'рџ‡¬рџ‡№',
    'JAM':'рџ‡Їрџ‡І','TRI':'рџ‡№рџ‡№','CUB':'рџ‡Ёрџ‡є','HAI':'рџ‡­рџ‡№',
  };
  return map[c] || 'рџЏґ';
}

// в”Ђв”Ђ Filtrado в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function filterMatches(filter) {
  const now = new Date();
  const todayStr = now.toISOString().slice(0,10);
  switch(filter) {
    case 'all':       return [...scoresData];
    case 'live':      return scoresData.filter(isLive);
    case 'finished':  return scoresData.filter(isDone);
    case 'scheduled': return scoresData.filter(isNS);
    case 'today':
      return scoresData.filter(m => {
        const d = m.kickoff || m.date;
        return d && d.slice(0,10) === todayStr;
      });
    default:          return [...scoresData];
  }
}

// в”Ђв”Ђ Badge de filtro в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const FILTER_LABELS = {
  all:'TODOS', live:'EN VIVO', finished:'JUGADOS',
  scheduled:'PRГ“XIMOS', today:'HOY', fixture:'FIXTURE',
  paises:'PAГЌSES', stats:'ESTADГЌSTICAS'
};

// в”Ђв”Ђ Render в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function render() {
  const badge = document.getElementById('tv-filter-badge');
  badge.textContent = FILTER_LABELS[currentFilter] || currentFilter.toUpperCase();

  const content = document.getElementById('tv-content');

  if (currentFilter === 'fixture') {
    renderBracket(content);
    return;
  }
  if (currentFilter === 'stats') {
    renderStats(content);
    return;
  }
  if (currentFilter === 'paises') {
    renderPaises(content);
    return;
  }

  const matches = filterMatches(currentFilter);

  // Ordenar: live в†’ scheduled в†’ finished
  const sorted = [...matches].sort((a,b) => {
    const pri = m => isLive(m) ? 0 : isNS(m) ? 1 : 2;
    if (pri(a) !== pri(b)) return pri(a) - pri(b);
    const da = new Date(a.kickoff || a.date);
    const db = new Date(b.kickoff || b.date);
    return da - db;
  });

  if (!sorted.length) {
    content.innerHTML = '<div class="tv-empty">No hay partidos en esta vista</div>';
    return;
  }

  // Agrupar por grupo/ronda
  const groups = {};
  sorted.forEach(m => {
    const g = m.group || m.round || 'Otros';
    if (!groups[g]) groups[g] = [];
    groups[g].push(m);
  });

  let html = '<div>';
  Object.entries(groups).forEach(([gname, gmatches]) => {
    html += `<div class="tv-group-block">
      <div class="tv-group-label">${gname}</div>
      <div class="tv-match-grid">`;
    gmatches.forEach(m => { html += buildCard(m); });
    html += '</div></div>';
  });
  html += '</div>';
  content.innerHTML = html;
}

// в”Ђв”Ђ Tarjeta de partido в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function buildCard(m) {
  const live = isLive(m);
  const done = isDone(m);
  const ns   = isNS(m);
  const cls  = live ? 'live' : done ? 'finished' : '';
  const sl   = statusLabel(m);

  let statusHtml = '';
  if (live)      statusHtml = `<span class="tv-card-status-live">рџ”ґ ${sl}</span>`;
  else if (done) statusHtml = `<span class="tv-card-status-finished">${sl}</span>`;
  else           statusHtml = `<span class="tv-card-status-ns">${sl}</span>`;

  const hg = m.home_goals ?? m.homeGoals ?? (ns ? '' : '0');
  const ag = m.away_goals ?? m.awayGoals ?? (ns ? '' : '0');

  const scoreHtml = ns
    ? `<div class="tv-time-ns">${sl}</div>`
    : `<div class="tv-score-wrap">
        <span>${hg}</span>
        <span class="tv-score-sep">вЂ“</span>
        <span>${ag}</span>
      </div>`;

  return `<div class="tv-card ${cls}">
    <div class="tv-card-header">
      <span>${m.venue || ''}</span>
      ${statusHtml}
    </div>
    <div class="tv-teams">
      <div class="tv-team">
        <div class="tv-team-flag">${flagEmoji(m.home_code)}</div>
        <div class="tv-team-name">${m.home_name || m.home_code || 'TBD'}</div>
      </div>
      ${scoreHtml}
      <div class="tv-team">
        <div class="tv-team-flag">${flagEmoji(m.away_code || m.away_name)}</div>
        <div class="tv-team-name">${m.away_name || m.away_code || 'TBD'}</div>
      </div>
    </div>
  </div>`;
}

// в”Ђв”Ђ Bracket (simplificado para TV) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function renderBracket(content) {
  content.innerHTML = `<div class="tv-empty">
    рџЏ† Vista Fixture вЂ” usГЎ el control remoto para navegar los filtros
  </div>`;
  // La vista bracket completa requiere la lГіgica de index.html
  // Por ahora muestra el aviso; puede expandirse en iteraciones futuras
}

// в”Ђв”Ђ Stats в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function renderStats(content) {
  // Goleadores: acumular de los eventos de cada partido
  const scorers = {};
  const cards   = {};
  scoresData.forEach(m => {
    (m.events || []).forEach(ev => {
      if (ev.type === 'Goal' && ev.detail !== 'Own Goal') {
        const k = ev.player || 'Desconocido';
        scorers[k] = (scorers[k] || 0) + 1;
      }
      if (ev.type === 'Card' && ev.detail === 'Yellow Card') {
        const k = ev.player || 'Desconocido';
        cards[k] = (cards[k] || 0) + 1;
      }
    });
  });

  const topScorers = Object.entries(scorers).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const topCards   = Object.entries(cards).sort((a,b)=>b[1]-a[1]).slice(0,10);

  const rows = (list) => list.map(([name,val],i) =>
    `<div class="tv-stats-row">
      <span class="tv-stats-rank">${i+1}</span>
      <span class="tv-stats-name">${name}</span>
      <span class="tv-stats-val">${val}</span>
    </div>`
  ).join('');

  content.innerHTML = `<div class="tv-stats-grid">
    <div class="tv-stats-section">
      <div class="tv-stats-title">вљЅ Goleadores</div>
      ${topScorers.length ? rows(topScorers) : '<div style="color:#64748b;">Sin datos aГєn</div>'}
    </div>
    <div class="tv-stats-section">
      <div class="tv-stats-title">рџџЁ Tarjetas Amarillas</div>
      ${topCards.length ? rows(topCards) : '<div style="color:#64748b;">Sin datos aГєn</div>'}
    </div>
  </div>`;
}

// в”Ђв”Ђ PaГ­ses в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function renderPaises(content) {
  content.innerHTML = '<div class="tv-empty">Vista PaГ­ses вЂ” prГіximamente en TV</div>';
}

// в”Ђв”Ђ Scroll indicator в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
let scrollTimer = null;
function showScrollIndicator() {
  const el = document.getElementById('tv-scroll-indicator');
  el.classList.add('visible');
  clearTimeout(scrollTimer);
  scrollTimer = setTimeout(() => el.classList.remove('visible'), 1500);
}
</script>
