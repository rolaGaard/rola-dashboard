<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixture rolaGaard — TV</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a0e1a; color:#fff;
  font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height:100vh; overflow-x:hidden;
}
.tv-header {
  background:#0a0a0a; border-bottom:2px solid #FFD700;
  padding:16px 48px;
  display:flex; align-items:center; justify-content:space-between;
}
.tv-header-left { display:flex; align-items:center; gap:16px; }
.tv-logo { width:56px; height:56px; border-radius:22.5%; box-shadow:0 0 0 2px #0a0a0a,0 0 0 3px #FFD700; }
.tv-title { font-size:28px; font-weight:800; color:#fff; }
.tv-sub { font-size:13px; color:#64748b; margin-top:2px; }
.tv-right { display:flex; align-items:center; gap:20px; }
.tv-filter-badge {
  background:#003087; color:#FFD700; border:1px solid #FFD700;
  font-size:13px; font-weight:800; letter-spacing:1px;
  padding:6px 16px; border-radius:20px;
}
.tv-clock { font-size:40px; font-weight:700; color:#FFD700; font-variant-numeric:tabular-nums; }

.tv-content { padding:28px 48px; }
.tv-group-label { color:#FFD700; font-size:13px; font-weight:800; letter-spacing:.08em; margin-bottom:10px; }
.tv-group-block { margin-bottom:24px; }
.tv-match-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(380px,1fr)); gap:14px; }

.tv-card {
  background:#fff; border-radius:14px; padding:16px 20px;
  border-left:5px solid #e2e8f0;
  display:flex; flex-direction:column; gap:8px;
}
.tv-card.live { border-left-color:#CC0000; }
.tv-card.finished { border-left-color:#003087; background:#e9eaed; }
.tv-card-top {
  display:flex; align-items:center; justify-content:space-between;
  font-size:11px; color:#64748b; font-weight:600;
}
.tv-badge-live { background:#CC0000; color:#fff; font-size:11px; font-weight:800; padding:2px 10px; border-radius:20px; }
.tv-badge-done { background:#003087; color:#FFD700; font-size:11px; font-weight:800; padding:2px 10px; border-radius:20px; }
.tv-badge-ns { color:#94a3b8; font-size:12px; font-weight:600; }

.tv-teams { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.tv-team { display:flex; flex-direction:column; align-items:center; gap:4px; flex:1; }
.tv-team img { width:36px; height:36px; object-fit:contain; }
.tv-team-flag { font-size:32px; line-height:1; }
.tv-team-name { font-size:13px; font-weight:800; color:#1a1a2e; text-align:center; line-height:1.2; }
.tv-score { display:flex; align-items:center; gap:6px; font-size:48px; font-weight:900; color:#1a1a2e; font-variant-numeric:tabular-nums; flex-shrink:0; }
.tv-score-sep { font-size:24px; color:#94a3b8; font-weight:400; }
.tv-time-ns { font-size:16px; font-weight:700; color:#1a1a2e; text-align:center; }

.tv-connecting {
  position:fixed; inset:0; background:#0a0e1a;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
}
.tv-connecting img { width:100px; height:100px; border-radius:22.5%; box-shadow:0 0 0 3px #FFD700; }
.tv-connecting-title { font-size:32px; font-weight:800; }
.tv-connecting-sub { font-size:16px; color:#64748b; }
.tv-dots { display:flex; gap:10px; }
.tv-dots span { width:12px; height:12px; border-radius:50%; background:#FFD700; animation:tvdot 1.2s infinite ease-in-out; }
.tv-dots span:nth-child(2){animation-delay:.2s}
.tv-dots span:nth-child(3){animation-delay:.4s}
@keyframes tvdot{0%,80%,100%{transform:scale(.5);opacity:.4}40%{transform:scale(1);opacity:1}}

.tv-empty { text-align:center; padding:60px; color:#64748b; font-size:18px; }

/* Stats */
.tv-stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
.tv-stats-box { background:#111827; border-radius:14px; padding:24px; border:1px solid #1f2937; }
.tv-stats-title { font-size:16px; font-weight:800; color:#FFD700; margin-bottom:14px; }
.tv-stats-row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid #1f2937; font-size:14px; color:#fff; }
.tv-stats-row:last-child{border-bottom:none}
.tv-stats-rank { color:#64748b; font-weight:700; min-width:24px; }
.tv-stats-name { flex:1; font-weight:600; margin:0 8px; }
.tv-stats-val { font-weight:800; color:#FFD700; font-size:18px; }
</style>
</head>
<body>

<div class="tv-connecting" id="tv-connecting">
  <img src="https://fixture.rolagaard.com/icons/icon-512.png" alt="rolaGaard">
  <div class="tv-connecting-title">Fixture rolaGaard</div>
  <div class="tv-connecting-sub">Esperando conexión desde el celular...</div>
  <div class="tv-dots"><span></span><span></span><span></span></div>
</div>

<div id="tv-main" style="display:none;">
  <div class="tv-header">
    <div class="tv-header-left">
      <img class="tv-logo" src="https://fixture.rolagaard.com/icons/icon-512.png" alt="rolaGaard">
      <div>
        <div class="tv-title">Mundial 2026</div>
        <div class="tv-sub">fixture.rolagaard.com</div>
      </div>
    </div>
    <div class="tv-right">
      <div class="tv-filter-badge" id="tv-badge">TODOS</div>
      <div class="tv-clock" id="tv-clock">--:--</div>
    </div>
  </div>
  <div class="tv-content" id="tv-content"></div>
</div>

<script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
<script>
const SCORES_URL  = 'https://fixture.rolagaard.com/scores.json';
const NAMESPACE   = 'urn:x-cast:com.rolagaard.fixture';
const POLL_MS     = 30000;

// ── Mismas constantes que index.html ─────────────────────────────────────────
const FLAGS = {
  'MEXICO':'🇲🇽','SOUTH AFRICA':'🇿🇦','CANADA':'🇨🇦','BOSNIA & HERZEGOVINA':'🇧🇦','SOUTH KOREA':'🇰🇷',
  'CZECHIA':'🇨🇿','USA':'🇺🇸','PARAGUAY':'🇵🇾','QATAR':'🇶🇦','SWITZERLAND':'🇨🇭',
  'AUSTRALIA':'🇦🇺','TURKIYE':'🇹🇷','MOROCCO':'🇲🇦','BRAZIL':'🇧🇷',
  'HAITI':'🇭🇹','SCOTLAND':'🏴','GERMANY':'🇩🇪','CURACAO':'🇨🇼',
  'NETHERLANDS':'🇳🇱','JAPAN':'🇯🇵','IVORY COAST':'🇨🇮','ECUADOR':'🇪🇨',
  'SWEDEN':'🇸🇪','TUNISIA':'🇹🇳','SPAIN':'🇪🇸','CAPE VERDE':'🇨🇻',
  'BELGIUM':'🇧🇪','EGYPT':'🇪🇬','SAUDI ARABIA':'🇸🇦','URUGUAY':'🇺🇾',
  'IRAN':'🇮🇷','NEW ZEALAND':'🇳🇿','FRANCE':'🇫🇷','SENEGAL':'🇸🇳',
  'IRAQ':'🇮🇶','NORWAY':'🇳🇴','ARGENTINA':'🇦🇷','ALGERIA':'🇩🇿',
  'AUSTRIA':'🇦🇹','JORDAN':'🇯🇴','PORTUGAL':'🇵🇹','CONGO DR':'🇨🇩',
  'COLOMBIA':'🇨🇴','UZBEKISTAN':'🇺🇿','ENGLAND':'🏴','GHANA':'🇬🇭',
  'CROATIA':'🇭🇷','PANAMA':'🇵🇦',
};
const INTL_NAMES = {
  'MEXICO':'Mexico','SOUTH AFRICA':'South Africa','CANADA':'Canada','BOSNIA & HERZEGOVINA':'Bosnia and Herzegovina',
  'SOUTH KOREA':'Republic of Korea','CZECHIA':'Czechia','USA':'United States','PARAGUAY':'Paraguay',
  'QATAR':'Qatar','SWITZERLAND':'Switzerland','AUSTRALIA':'Australia','TURKIYE':'Turkiye',
  'MOROCCO':'Morocco','BRAZIL':'Brazil','HAITI':'Haiti','SCOTLAND':'Scotland',
  'GERMANY':'Germany','CURACAO':'Curacao','NETHERLANDS':'Netherlands','JAPAN':'Japan',
  'IVORY COAST':"Cote d'Ivoire",'ECUADOR':'Ecuador','SWEDEN':'Sweden','TUNISIA':'Tunisia',
  'SPAIN':'Spain','CAPE VERDE':'Cabo Verde','BELGIUM':'Belgium','EGYPT':'Egypt',
  'SAUDI ARABIA':'Saudi Arabia','URUGUAY':'Uruguay','IRAN':'Iran','NEW ZEALAND':'New Zealand',
  'FRANCE':'France','SENEGAL':'Senegal','IRAQ':'Iraq','NORWAY':'Norway',
  'ARGENTINA':'Argentina','ALGERIA':'Algeria','AUSTRIA':'Austria','JORDAN':'Jordan',
  'PORTUGAL':'Portugal','CONGO DR':'D.R. Congo','COLOMBIA':'Colombia','UZBEKISTAN':'Uzbekistan',
  'ENGLAND':'England','GHANA':'Ghana','CROATIA':'Croatia','PANAMA':'Panama',
};
const FLAG_FILES = {
  'MEXICO':'mx','SOUTH AFRICA':'za','CANADA':'ca','BOSNIA & HERZEGOVINA':'ba',
  'SOUTH KOREA':'kr','CZECHIA':'cz','USA':'us','PARAGUAY':'py','QATAR':'qa',
  'SWITZERLAND':'ch','AUSTRALIA':'au','TURKIYE':'tr','MOROCCO':'ma','BRAZIL':'br',
  'HAITI':'ht','SCOTLAND':'gb-sct','GERMANY':'de','CURACAO':'cw','NETHERLANDS':'nl',
  'JAPAN':'jp','IVORY COAST':'ci','ECUADOR':'ec','SWEDEN':'se','TUNISIA':'tn',
  'SPAIN':'es','CAPE VERDE':'cv','BELGIUM':'be','EGYPT':'eg','SAUDI ARABIA':'sa',
  'URUGUAY':'uy','IRAN':'ir','NEW ZEALAND':'nz','FRANCE':'fr','SENEGAL':'sn',
  'IRAQ':'iq','NORWAY':'no','ARGENTINA':'ar','ALGERIA':'dz','AUSTRIA':'at',
  'JORDAN':'jo','PORTUGAL':'pt','CONGO DR':'cd','COLOMBIA':'co','UZBEKISTAN':'uz',
  'ENGLAND':'gb-eng','GHANA':'gh','CROATIA':'hr','PANAMA':'pa',
};

const FILTER_LABELS = {
  all:'TODOS', live:'EN VIVO', finished:'JUGADOS',
  scheduled:'PRÓXIMOS', today:'HOY', fixture:'FIXTURE',
  paises:'PAÍSES', stats:'ESTADÍSTICAS'
};

const STATUS_LIVE = ['1H','HT','2H','ET','BT','P'];
const STATUS_DONE = ['FT','AET','PEN'];

function isLive(m){ return STATUS_LIVE.includes(m.status); }
function isDone(m){ return STATUS_DONE.includes(m.status); }
function isNS(m){   return m.status === 'NS'; }

function flag(name) {
  if (!name) return '🏳';
  if (FLAG_FILES[name]) {
    return '<img src="https://fixture.rolagaard.com/flags/' + encodeURIComponent(name) + '.svg" alt="' + name + '" style="width:36px;height:36px;object-fit:contain;" loading="lazy">';
  }
  return FLAGS[name] || '🏳';
}
function displayName(name) { return INTL_NAMES[name] || name || 'TBD'; }

function statusLabel(m) {
  if (isDone(m)) return 'FINALIZADO';
  if (m.status === 'HT') return 'ENTRETIEMPO';
  if (m.status === 'BT') return 'DESCANSO ET';
  if (m.status === 'P')  return 'PENALES';
  if (m.status === '1H' || m.status === '2H' || m.status === 'ET') {
    const e = m.elapsed;
    return (e === 99 ? '90+9\'' : (e||'') + '\'');
  }
  if (isNS(m)) {
    return new Date(m.kickoff).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }
  return m.status;
}

// ── Estado ────────────────────────────────────────────────────────────────────
let scoresData = [];
let currentFilter = 'all';

// ── Cast Receiver ─────────────────────────────────────────────────────────────
const ctx = cast.framework.CastReceiverContext.getInstance();

ctx.addCustomMessageListener(NAMESPACE, (event) => {
  const msg = event.data;
  if (!msg) return;
  if (msg.type === 'filter') {
    currentFilter = msg.value;
    render();
  } else if (msg.type === 'scroll') {
    document.getElementById('tv-content').scrollTop += msg.delta;
  }
});

ctx.addEventListener(cast.framework.system.EventType.READY, () => {
  document.getElementById('tv-connecting').style.display = 'none';
  document.getElementById('tv-main').style.display = 'block';
  loadData();
});

ctx.start({ disableIdleTimeout: true });

// ── Reloj ─────────────────────────────────────────────────────────────────────
function tick() {
  document.getElementById('tv-clock').textContent =
    new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}
tick(); setInterval(tick, 1000);

// ── Carga de datos ────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const r = await fetch(SCORES_URL + '?t=' + Date.now());
    const json = await r.json();
    const raw = json.matches || json.fixtures || json || {};
    if (Array.isArray(raw)) {
      scoresData = raw;
    } else {
      scoresData = Object.entries(raw).map(([key, m]) => {
        const parts = key.split('-');
        const home = parts[0] || '';
        const away = parts.slice(1).join('-') || '';
        return {
          ...m,
          home_name: home,
          away_name: away,
          kickoff: m.kickoffUTC,
          group: m.round || '',
        };
      });
    }
    render();
  } catch(e) {
    console.error('tv loadData error:', e);
  }
}
setInterval(loadData, POLL_MS);

// ── Filtrado ──────────────────────────────────────────────────────────────────
function filterMatches(f) {
  const todayStr = new Date().toISOString().slice(0,10);
  switch(f) {
    case 'all':       return [...scoresData];
    case 'live':      return scoresData.filter(isLive);
    case 'finished':  return scoresData.filter(isDone);
    case 'scheduled': return scoresData.filter(isNS);
    case 'today':
      return scoresData.filter(m => (m.kickoff||'').slice(0,10) === todayStr);
    default: return [...scoresData];
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('tv-badge').textContent =
    FILTER_LABELS[currentFilter] || currentFilter.toUpperCase();

  const content = document.getElementById('tv-content');

  if (currentFilter === 'stats') { renderStats(content); return; }
  if (currentFilter === 'paises') {
    content.innerHTML = '<div class="tv-empty">Vista Países — usá los filtros para navegar</div>'; return;
  }
  if (currentFilter === 'fixture') {
    content.innerHTML = '<div class="tv-empty">Vista Fixture — bracket disponible en la app</div>'; return;
  }

  const matches = filterMatches(currentFilter);

  // Ordenar: live → NS → done; dentro de done: más reciente primero
  const sorted = [...matches].sort((a,b) => {
    const pri = m => isLive(m) ? 0 : isNS(m) ? 1 : 2;
    const pa = pri(a), pb = pri(b);
    if (pa !== pb) return pa - pb;
    const da = new Date(a.kickoff||a.kickoffUTC||0);
    const db = new Date(b.kickoff||b.kickoffUTC||0);
    return pa === 2 ? db - da : da - db;
  });

  if (!sorted.length) {
    content.innerHTML = '<div class="tv-empty">No hay partidos en esta vista</div>';
    return;
  }

  // Agrupar por ronda/grupo
  const groups = {};
  sorted.forEach(m => {
    const g = m.group || m.round || 'Otros';
    if (!groups[g]) groups[g] = [];
    groups[g].push(m);
  });

  let html = '';
  Object.entries(groups).forEach(([g, list]) => {
    html += '<div class="tv-group-block">';
    html += '<div class="tv-group-label">' + g + '</div>';
    html += '<div class="tv-match-grid">';
    list.forEach(m => { html += buildCard(m); });
    html += '</div></div>';
  });
  content.innerHTML = html;
}

function buildCard(m) {
  const live = isLive(m), done = isDone(m), ns = isNS(m);
  const cls = live ? 'live' : done ? 'finished' : '';
  const sl = statusLabel(m);
  const home = m.home_name || m.home || '';
  const away = m.away_name || m.away || '';
  const hg = m.homeGoals ?? (ns ? '' : '0');
  const ag = m.awayGoals ?? (ns ? '' : '0');

  let badge = '';
  if (live)      badge = '<span class="tv-badge-live">🔴 ' + sl + '</span>';
  else if (done) badge = '<span class="tv-badge-done">' + sl + '</span>';
  else           badge = '<span class="tv-badge-ns">' + sl + '</span>';

  const scoreHtml = ns
    ? '<div class="tv-time-ns">' + sl + '</div>'
    : '<div class="tv-score"><span>' + hg + '</span><span class="tv-score-sep">–</span><span>' + ag + '</span></div>';

  return '<div class="tv-card ' + cls + '">' +
    '<div class="tv-card-top"><span>' + (m.venue||'') + '</span>' + badge + '</div>' +
    '<div class="tv-teams">' +
      '<div class="tv-team">' + flag(home) + '<div class="tv-team-name">' + displayName(home) + '</div></div>' +
      scoreHtml +
      '<div class="tv-team">' + flag(away) + '<div class="tv-team-name">' + displayName(away) + '</div></div>' +
    '</div>' +
  '</div>';
}

function renderStats(content) {
  const scorers = {}, cards = {};
  scoresData.forEach(m => {
    (m.events||[]).forEach(ev => {
      if (ev.type === 'Goal' && ev.detail !== 'Own Goal') {
        scorers[ev.player] = (scorers[ev.player]||0) + 1;
      }
      if (ev.type === 'Card' && ev.detail === 'Yellow Card') {
        cards[ev.player] = (cards[ev.player]||0) + 1;
      }
    });
  });
  const topS = Object.entries(scorers).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const topC = Object.entries(cards).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const rows = list => list.map(([n,v],i) =>
    '<div class="tv-stats-row"><span class="tv-stats-rank">' + (i+1) + '</span>' +
    '<span class="tv-stats-name">' + n + '</span>' +
    '<span class="tv-stats-val">' + v + '</span></div>'
  ).join('');
  content.innerHTML = '<div class="tv-stats-grid">' +
    '<div class="tv-stats-box"><div class="tv-stats-title">⚽ Goleadores</div>' +
    (topS.length ? rows(topS) : '<div style="color:#64748b">Sin datos</div>') + '</div>' +
    '<div class="tv-stats-box"><div class="tv-stats-title">🟨 Tarjetas Amarillas</div>' +
    (topC.length ? rows(topC) : '<div style="color:#64748b">Sin datos</div>') + '</div>' +
    '</div>';
}
</script>
</body>
</html>
